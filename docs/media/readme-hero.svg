        <text x="20" y="28" fill="#8da5b7" font-size="10" font-weight="850" letter-spacing="1.5">VERIFIED DELIVERY CHAIN</text>
        <text x="20" y="55" fill="#ffffff" font-size="15" font-weight="800">Canonical source → CI → release → Greasy Fork → private recovery</text>
