name: Actions Tree Inventory

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - ".github/workflows/actions-tree-inventory.yml"

permissions:
  contents: read

jobs:
  tree:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Record branch tree
        shell: bash
        run: |
          git rev-parse HEAD > commit-sha.txt
          git rev-parse 'HEAD^{tree}' > tree-sha.txt
      - name: Upload tree identifiers
        uses: actions/upload-artifact@v6
        with:
          name: actions-tree-identifiers
          path: |
            commit-sha.txt
            tree-sha.txt
          retention-days: 1
