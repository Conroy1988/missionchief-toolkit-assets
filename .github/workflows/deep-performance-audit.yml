name: Deep Performance Audit

on:
  pull_request:
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - ".github/scripts/deep_performance_audit.mjs"
      - ".github/scripts/reconcile_deep_performance_audit.mjs"
      - ".github/scripts/extract_deep_performance_evidence.mjs"
      - ".github/scripts/test_deep_performance_audit.mjs"
      - ".github/scripts/test_reconcile_deep_performance_audit.mjs"
      - ".github/workflows/deep-performance-audit.yml"
      - "docs/audits/deep-performance-audit-v4.20.17.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolkit-deep-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Inventory runtime hotspots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify measurement-only audit branch
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'audit/')
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if ! git diff --quiet "$BASE_SHA...HEAD" -- src dist; then
            echo "::error::Measurement-only audit branches must not modify src/ or dist/."
            git diff --stat "$BASE_SHA...HEAD" -- src dist
            exit 1
          fi

      - name: Restore Acorn package cache
        id: acorn-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: toolkit-deep-audit-${{ runner.os }}-acorn-8.15.0

      - name: Install exact JavaScript parser
        run: npm install --no-save --ignore-scripts --no-audit --no-fund acorn@8.15.0

      - name: Save Acorn package cache
        if: steps.acorn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: toolkit-deep-audit-${{ runner.os }}-acorn-8.15.0

      - name: Check deep-audit script syntax
        run: |
          node --check .github/scripts/deep_performance_audit.mjs
          node --check .github/scripts/reconcile_deep_performance_audit.mjs
          node --check .github/scripts/extract_deep_performance_evidence.mjs
          node --check .github/scripts/test_deep_performance_audit.mjs
          node --check .github/scripts/test_reconcile_deep_performance_audit.mjs

      - name: Run AST analyser fixtures
        run: node .github/scripts/test_deep_performance_audit.mjs

      - name: Run baseline reconciliation fixtures
        run: node .github/scripts/test_reconcile_deep_performance_audit.mjs

      - name: Generate deep performance inventory
        run: |
          node .github/scripts/deep_performance_audit.mjs \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --json-output deep-performance-audit.json \
            --markdown-output deep-performance-audit.md
          node .github/scripts/reconcile_deep_performance_audit.mjs \
            deep-performance-audit.json \
            deep-performance-audit.md

      - name: Extract exact shortlisted source evidence
        run: |
          node .github/scripts/extract_deep_performance_evidence.mjs \
            src/MissionChief_Map_Command_Toolkit.user.js \
            deep-performance-source-evidence.md \
            updateUI \
            applyRootAttributes \
            triggerPayoutFlash \
            stopPayoutFlashAnimation \
            createMissionLockOnReticle \
            toggleCommandBar \
            connectMainMutationObserver \
            boot

      - name: Cross-check trusted v4.20.17 observer baseline
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .baselineCrossCheck.measuredMutationObserverConstructions == .baselineCrossCheck.expectedMutationObserverConstructions and
            .baselineCrossCheck.measuredResizeObserverConstructions == .baselineCrossCheck.expectedResizeObserverConstructions and
            .baselineCrossCheck.measuredBroadSubtreeObservers == .baselineCrossCheck.expectedBroadSubtreeObservers
          ' deep-performance-audit.json > /dev/null

      - name: Publish audit summary
        run: cat deep-performance-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-deep-performance-audit
          path: |
            deep-performance-audit.json
            deep-performance-audit.md
            deep-performance-source-evidence.md
          if-no-files-found: error
          retention-days: 30
