name: Structural Audit Context Probe

on:
  pull_request:
    paths:
      - ".github/workflows/structural-audit-context-probe.yml"
      - ".github/scripts/audit_userscript_structure.py"

permissions:
  contents: read

jobs:
  probe:
    if: github.event.pull_request.number == 33
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Print candidate finding context
        shell: python {0}
        run: |
          from pathlib import Path
          lines = Path('src/MissionChief_Map_Command_Toolkit.user.js').read_text(encoding='utf-8').splitlines()
          for number in [25937, 25938, 25947, 25948, 26108, 26109, 26110, 26459]:
              print(f'LINE {number}: {lines[number-1][:500]}')
