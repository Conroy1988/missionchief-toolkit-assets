name: Update Help Centre for v4.3.0

on:
  push:
    paths:
      - '.github/workflows/update-help-v4.3.0.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-help:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update searchable guide and manifest
        shell: python
        run: |
          from pathlib import Path
          import json

          path = Path('help/index.html')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('Guide for Toolkit v4.2.1', 'Guide for Toolkit v4.3.0'),
              ('Help Centre for v4.2.1', 'Help Centre for v4.3.0'),
              ('<div class="card"><h3>Umbrella</h3><p>Sterile biohazard command styling with classified containment panels.</p></div>', '<div class="card"><h3>Umbrella Containment</h3><p>Corporate BSL-4 command styling with original transparent emblem, facility schematic, surveillance terminal, specimen vial and containment-division artwork.</p></div>'),
              ('Biohazard Containment</span>', 'Umbrella Containment</span>'),
              ('Set a minimum payout threshold, duration, theme, audio state and volume. Use the test amount control before relying on a new setup.', 'Set a minimum payout threshold, duration, theme, audio state and volume. Umbrella Containment now uses the same identity, artwork package and renamed hosted audio as the Umbrella UI theme. Use the test amount control before relying on a new setup.'),
              ('<li>Presentation titles and particle treatment scale by payout tier.</li>', '<li>Presentation titles and particle treatment scale by payout tier.</li><li>Umbrella Containment displays BSL-4 facility, surveillance, corporate emblem and transfer-authorisation artwork.</li>')
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Missing guide marker: {old[:70]}')
              text = text.replace(old, new, 1)
          semantic = '<div class="callout warning"><strong>Protected semantic colours:</strong> clearing, assistance, warning, critical and syncing states retain their operational meaning across every theme.</div>'
          asset_note = '<div class="callout"><strong>Umbrella Containment asset package:</strong> decorative artwork is loaded from the public Toolkit assets repository only while the theme is in use. Missing artwork never blocks the Toolkit, and the graphics do not replace protected operational colours.</div>\n        ' + semantic
          if semantic not in text:
              raise SystemExit('Missing semantic-colour guide marker')
          text = text.replace(semantic, asset_note, 1)
          path.write_text(text, encoding='utf-8')

          manifest_path = Path('help/manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['guideVersion'] = '4.3.0'
          manifest['toolkitVersion'] = '4.3.0'
          manifest['updated'] = '2026-07-13'
          manifest['umbrellaContainmentPackage'] = 'themes/umbrella/manifest.json'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
      - name: Commit guide update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add help/index.html help/manifest.json
          if git diff --cached --quiet; then
            echo 'Guide already current.'
            exit 0
          fi
          git commit -m 'Update Help Centre for Umbrella Containment v4.3.0'
          git push
