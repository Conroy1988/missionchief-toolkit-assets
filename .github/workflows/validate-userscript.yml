name: Validate Canonical Userscript

on:
  pull_request:
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - "CHANGELOG.md"
      - "README.md"
      - "docs/site-data.json"
      - "docs/media/readme-hero.svg"
      - "help/index.html"
      - "documentation-drift-report.json"
      - "documentation-drift-report.md"
      - ".github/scripts/validate_userscript.py"
      - ".github/scripts/verify_validation_candidate.py"
      - ".github/scripts/test_documentation_consistency.py"
      - ".github/scripts/test_validation_candidate_pipeline.py"
      - ".github/scripts/test_version_status_contract.py"
      - ".github/workflows/auto-release-after-validation.yml"
      - ".github/workflows/owner-release-command.yml"
      - ".github/workflows/publish-update-manifest.yml"
      - ".github/workflows/release-toolkit.yml"
      - ".github/workflows/validate-userscript.yml"
      - "status/source-baseline.json"
      - "status/update-manifest.json"
  push:
    branches:
      - main
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - "CHANGELOG.md"
      - "README.md"
      - "docs/site-data.json"
      - "docs/media/readme-hero.svg"
      - "help/index.html"
      - "documentation-drift-report.json"
      - "documentation-drift-report.md"
      - ".github/scripts/validate_userscript.py"
      - ".github/scripts/verify_validation_candidate.py"
      - ".github/scripts/test_documentation_consistency.py"
      - ".github/scripts/test_validation_candidate_pipeline.py"
      - ".github/scripts/test_version_status_contract.py"
      - ".github/workflows/auto-release-after-validation.yml"
      - ".github/workflows/owner-release-command.yml"
      - ".github/workflows/publish-update-manifest.yml"
      - ".github/workflows/release-toolkit.yml"
      - ".github/workflows/validate-userscript.yml"
      - "status/source-baseline.json"
      - "status/update-manifest.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canonical-userscript-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate and package immutable candidate evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact repository state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate candidate-verifier self-tests
        run: python3 .github/scripts/verify_validation_candidate.py --self-test

      - name: Validate userscript and build candidate distribution
        id: validate
        shell: bash
        run: |
          set +e
          python3 .github/scripts/validate_userscript.py > validation.log 2>&1
          status=$?
          cat validation.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-validation-diagnostics-${{ github.sha }}
          path: validation.log
          if-no-files-found: error
          retention-days: 14

      - name: Stop on validation failure
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Userscript validation failed. See the diagnostics artifact."
          exit 1

      - name: Validate documentation consistency
        run: python3 .github/scripts/test_documentation_consistency.py

      - name: Check JavaScript syntax
        run: node --check src/MissionChief_Map_Command_Toolkit.user.js

      - name: Verify distribution files are identical
        run: cmp --silent dist/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt

      - name: Write immutable validation candidate evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p validation-candidate
          VERSION="$(jq -r '.version' dist/release-manifest.json)"
          HASH="$(jq -r '.sha256' dist/release-manifest.json)"
          SOURCE_HASH="$(sha256sum src/MissionChief_Map_Command_Toolkit.user.js | awk '{print $1}')"
          USER_HASH="$(sha256sum dist/MissionChief_Map_Command_Toolkit.user.js | awk '{print $1}')"
          TEXT_HASH="$(sha256sum dist/MissionChief_Map_Command_Toolkit.txt | awk '{print $1}')"
          [[ "$HASH" == "$SOURCE_HASH" && "$HASH" == "$USER_HASH" && "$HASH" == "$TEXT_HASH" ]]

          jq -n \
            --arg workflow "Validate Canonical Userscript" \
            --arg commit "$GITHUB_SHA" \
            --arg ref "$GITHUB_REF" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg version "$VERSION" \
            --arg sha256 "$HASH" \
            --arg generatedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              schemaVersion: 1,
              state: "validated",
              workflow: $workflow,
              sourceCommit: $commit,
              sourceRef: $ref,
              eventName: $event,
              version: $version,
              sha256: $sha256,
              generatedAt: $generatedAt,
              distribution: {
                userScript: "dist/MissionChief_Map_Command_Toolkit.user.js",
                text: "dist/MissionChief_Map_Command_Toolkit.txt",
                checksums: "dist/SHA256SUMS.txt",
                manifest: "dist/release-manifest.json"
              },
              storage: {
                type: "workflow-artifact",
                publicMainChanged: false,
                releaseDashboardChanged: false
              }
            }' > validation-candidate/validation-candidate.json

          python3 .github/scripts/verify_validation_candidate.py \
            --evidence validation-candidate/validation-candidate.json \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --dist-dir dist \
            --expected-commit "$GITHUB_SHA" \
            --expected-ref "$GITHUB_REF" \
            --expected-version "$VERSION"

      - name: Upload immutable validation candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-validation-candidate-${{ github.sha }}
          path: |
            validation-candidate/validation-candidate.json
            dist/MissionChief_Map_Command_Toolkit.user.js
            dist/MissionChief_Map_Command_Toolkit.txt
            dist/SHA256SUMS.txt
            dist/release-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Write validation summary
        shell: bash
        run: |
          VERSION="$(jq -r '.version' validation-candidate/validation-candidate.json)"
          HASH="$(jq -r '.sha256' validation-candidate/validation-candidate.json)"
          {
            echo "# Toolkit v${VERSION} canonical validation"
            echo
            echo "- ✅ Canonical source validated"
            echo "- ✅ JavaScript syntax checked"
            echo "- ✅ Distribution files are byte-identical"
            echo "- ✅ Candidate SHA-256: \`${HASH}\`"
            echo "- ✅ Exact source commit: \`${GITHUB_SHA}\`"
            echo "- 📦 Candidate retained as an immutable workflow artifact"
            echo "- ⛔ Public main changed: no"
            echo "- ⛔ Release dashboard changed: no"
          } >> "$GITHUB_STEP_SUMMARY"
