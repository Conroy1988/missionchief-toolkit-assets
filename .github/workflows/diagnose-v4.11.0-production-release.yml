name: Diagnose Toolkit v4.11.0 Production Release

on:
  pull_request:
    types:
      - opened

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    name: Print latest production-release failure
    if: github.event.pull_request.title == '[Diagnose] Toolkit v4.11.0 Production Release'
    runs-on: ubuntu-latest
    steps:
      - name: Print latest Release Toolkit failure
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release-toolkit.yml --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId')"
          [[ -n "$RUN_ID" ]] || { echo "No Release Toolkit run found."; exit 1; }
          echo "Release Toolkit run: $RUN_ID"
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY"
          echo "===== FAILED LOGS ====="
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed
