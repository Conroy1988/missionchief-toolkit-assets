name: Full Userscript Audit

run-name: Full userscript audit · ${{ github.event_name }}

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - "dist/MissionChief_Map_Command_Toolkit.user.js"
      - ".github/eslint-userscript.config.mjs"
      - ".github/scripts/full_userscript_audit.py"
      - ".github/scripts/refine_full_userscript_audit.py"
      - ".github/scripts/summarise_eslint_audit.py"
      - ".github/scripts/extract_userscript_audit_evidence.py"
      - ".github/workflows/full-userscript-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolkit-full-userscript-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit complete canonical userscript
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify JavaScript syntax
        run: node --check src/MissionChief_Map_Command_Toolkit.user.js

      - name: Run full static audit
        id: full_audit
        shell: bash
        run: |
          set +e
          python3 .github/scripts/full_userscript_audit.py \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --dist dist/MissionChief_Map_Command_Toolkit.user.js \
            --json-output full-userscript-audit-raw.json \
            --markdown-output full-userscript-audit-raw.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Refine audit and attach exact source evidence
        id: refined_audit
        shell: bash
        run: |
          set +e
          python3 .github/scripts/refine_full_userscript_audit.py \
            --raw full-userscript-audit-raw.json \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --json-output full-userscript-audit.json \
            --markdown-output full-userscript-audit.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install exact ESLint audit engine
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts --no-audit --no-fund eslint@9.32.0

      - name: Run AST-backed ESLint audit
        id: eslint
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/eslint \
            --config .github/eslint-userscript.config.mjs \
            --no-ignore \
            --format json \
            src/MissionChief_Map_Command_Toolkit.user.js \
            > eslint-userscript-raw.json
          ESLINT_STATUS=$?
          python3 .github/scripts/summarise_eslint_audit.py \
            --input eslint-userscript-raw.json \
            --json-output eslint-userscript-audit.json \
            --markdown-output eslint-userscript-audit.md
          SUMMARY_STATUS=$?
          echo "eslint_exit_code=$ESLINT_STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_exit_code=$SUMMARY_STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Extract exact source evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/extract_userscript_audit_evidence.py \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --eslint eslint-userscript-audit.json \
            --output userscript-audit-evidence.md

      - name: Run established code-integrity audit
        id: integrity
        shell: bash
        run: |
          set +e
          python3 .github/scripts/check_code_integrity.py \
            --candidate src/MissionChief_Map_Command_Toolkit.user.js \
            --policy .github/code-integrity-policy.json \
            --json-output full-audit-code-integrity.json \
            --markdown-output full-audit-code-integrity.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run static asset audit
        id: assets
        shell: bash
        run: |
          set +e
          python3 .github/scripts/check_asset_health.py \
            --mode static \
            --json-output full-audit-assets.json \
            --markdown-output full-audit-assets.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run performance regression audit
        id: performance
        shell: bash
        run: |
          set +e
          python3 .github/scripts/check_performance_budget.py \
            --candidate src/MissionChief_Map_Command_Toolkit.user.js \
            --policy .github/performance-budget.json \
            --json-output full-audit-performance.json \
            --markdown-output full-audit-performance.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish complete audit summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cat full-userscript-audit.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat eslint-userscript-audit.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat full-audit-code-integrity.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat full-audit-performance.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat full-audit-assets.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload complete audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-full-userscript-audit
          path: |
            full-userscript-audit-raw.json
            full-userscript-audit-raw.md
            full-userscript-audit.json
            full-userscript-audit.md
            eslint-userscript-raw.json
            eslint-userscript-audit.json
            eslint-userscript-audit.md
            userscript-audit-evidence.md
            full-audit-code-integrity.json
            full-audit-code-integrity.md
            full-audit-performance.json
            full-audit-performance.md
            full-audit-assets.json
            full-audit-assets.md
          if-no-files-found: error
          retention-days: 90

      - name: Stop on definite audit failure
        if: >-
          steps.full_audit.outputs.exit_code != '0' ||
          steps.refined_audit.outputs.exit_code != '0' ||
          steps.eslint.outputs.summary_exit_code != '0' ||
          steps.integrity.outputs.exit_code != '0' ||
          steps.performance.outputs.exit_code != '0' ||
          steps.assets.outputs.exit_code != '0'
        run: |
          echo "One or more definite audit gates failed. Review the workflow summary and evidence artifact."
          exit 1
