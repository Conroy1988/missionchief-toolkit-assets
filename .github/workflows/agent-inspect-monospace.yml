name: Agent inspect monospaced notes integration

on:
  push:
    branches:
      - agent/monospaced-mission-notes
    paths-ignore:
      - agent-inspection.txt
      - agent-targeted.txt

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/monospaced-mission-notes
      - name: Persist targeted userscript anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('src/MissionChief_Map_Command_Toolkit.user.js')
          output_path = Path('agent-targeted.txt')
          lines = source_path.read_text(encoding='utf-8').splitlines()
          report = []

          def add_range(start, end, title):
              report.append(f"\n===== {title} · source lines {start}-{end} =====")
              for n in range(max(1, start), min(len(lines), end) + 1):
                  report.append(f"{n:06d}: {lines[n - 1]}")

          for start, end, title in [
              (1325, 1495, 'state defaults and normalisation'),
              (14715, 14775, 'root attributes'),
              (28995, 29220, 'feature toggle routing'),
              (29880, 30280, 'panel feature markup'),
              (30281, 30680, 'panel settings markup'),
              (30681, 31120, 'panel event routing'),
              (31121, 31785, 'startup and observers'),
          ]:
              add_range(start, end, title)

          patterns = [
              "function makeToggleButton",
              "makeToggleButton(",
              "dataset.feature",
              "data-feature",
              "closest('[data-feature",
              'closest("[data-feature',
              "activeTab === 'settings'",
              'data-tab="settings"',
              "state = loadState",
              "applyRootAttributes()",
              "saveState()",
              "renderPanel()",
              "style.textContent",
              "document.createElement('style')",
          ]
          seen = set()
          for pattern in patterns:
              matches = [i for i, line in enumerate(lines) if pattern in line]
              report.append(f"\n===== MATCH {pattern!r} · {len(matches)} =====")
              for i in matches[:50]:
                  start = max(0, i - 10)
                  end = min(len(lines), i + 11)
                  key = (start, end)
                  if key in seen:
                      continue
                  seen.add(key)
                  report.extend(f"{n + 1:06d}: {lines[n]}" for n in range(start, end))

          output_path.write_text("\n".join(report) + "\n", encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add agent-targeted.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record targeted monospaced notes anchors [skip ci]"
            git push origin HEAD:agent/monospaced-mission-notes
          fi
