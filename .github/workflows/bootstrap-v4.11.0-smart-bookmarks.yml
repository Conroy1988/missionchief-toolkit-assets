name: Bootstrap Toolkit v4.11.0 Smart Bookmark Labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/bootstrap-v4.11.0-smart-bookmarks.yml"
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: read

concurrency:
  group: toolkit-v4-11-0-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap-and-release:
    name: Restore canonical source, apply v4.11.0 and run release pipeline
    if: github.event_name != 'issues' || github.event.issue.title == '[Release] Toolkit v4.11.0 Smart Bookmark Labels'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    env:
      RELEASE_VERSION: "4.11.0"
      BASELINE_VERSION: "4.10.4"
      BASELINE_SHA256: "37952e796f3b11b3ce9bcaee860e7bd3d206afbc9c7de9fac63fd8d940427c82"
      EXPECTED_SHA256: "528a6aa829b8e6f5fb3f0c421e74959ff3dba5c2fedb5065dfa254fccf5a014f"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Restore exact v4.10.4 canonical baseline
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_URL="$(jq -r '.sourceUrl' status/source-baseline.json)"
          curl --fail --silent --show-error --location --compressed --max-time 60 \
            --header "Cache-Control: no-cache" \
            "${SOURCE_URL}?cache_bust=$(date +%s%N)" \
            --output src/MissionChief_Map_Command_Toolkit.user.js
          ACTUAL="$(sha256sum src/MissionChief_Map_Command_Toolkit.user.js | awk '{print $1}')"
          [[ "$ACTUAL" == "$BASELINE_SHA256" ]] || {
            echo "::error::Greasy Fork baseline hash mismatch. Expected $BASELINE_SHA256, received $ACTUAL."
            exit 1
          }
          echo "Exact v${BASELINE_VERSION} baseline restored."

      - name: Apply Smart Bookmark Labels patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/patches/v4.11.0-smart-bookmarks.patch.gz.b64 | gzip --decompress --stdout > /tmp/v4.11.0.patch
          patch --strip=1 --forward --batch < /tmp/v4.11.0.patch
          ACTUAL="$(sha256sum src/MissionChief_Map_Command_Toolkit.user.js | awk '{print $1}')"
          [[ "$ACTUAL" == "$EXPECTED_SHA256" ]] || {
            echo "::error::v4.11.0 source hash mismatch. Expected $EXPECTED_SHA256, received $ACTUAL."
            exit 1
          }

      - name: Update changelog and repository version references
        shell: python
        run: |
          from pathlib import Path

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          old = """## [Unreleased]\n\n### Pipeline\n- GitHub release automation is being introduced without changing the current Greasy Fork distribution path.\n\n"""
          new = """## [Unreleased]\n\n## [4.11.0] - 2026-07-14\n\n### Added\n- Added Smart Bookmark Labels with UK-aware place and operational-word abbreviation dictionaries.\n- Added consonant-compression fallback for custom user-entered locations.\n- Added automatic duplicate-label numbering across quick places and custom bookmarks.\n- Added manual short-label overrides without requiring the bookmark location to be resaved.\n- Added full-name desktop tooltips, accessible labels and touch long-press name previews.\n\n### Changed\n- Replaced equal-width bookmark shortcut tiles with compact content-sized controls.\n- Reduced bookmark shortcut height and spacing across Desktop, Tablet and iOS Mobile Mode.\n- Preserved every existing interface theme, colour treatment, border, shadow and active state.\n- Updated responsive dock calculations for the smaller bookmark footprint.\n\n"""
          if old not in text:
              raise SystemExit("Expected Unreleased changelog block was not found")
          changelog.write_text(text.replace(old, new, 1), encoding="utf-8")

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          text = text.replace("version-4.10.4-2563eb", "version-4.11.0-2563eb")
          text = text.replace("Current validated version | `4.10.4`", "Current validated version | `4.11.0`")
          readme.write_text(text, encoding="utf-8")

          readiness = Path(".github/workflows/release-readiness-check.yml")
          text = readiness.read_text(encoding="utf-8")
          text = text.replace('default: "4.10.4"', 'default: "4.11.0"', 1)
          readiness.write_text(text, encoding="utf-8")

      - name: Validate canonical source and build distribution
        shell: bash
        run: |
          set -euo pipefail
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          python3 .github/scripts/validate_userscript.py
          cmp --silent dist/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt
          test "$(jq -r '.version' dist/release-manifest.json)" = "$RELEASE_VERSION"
          test "$(jq -r '.sha256' dist/release-manifest.json)" = "$EXPECTED_SHA256"

      - name: Record validated pending-release state
        shell: bash
        run: |
          set -euo pipefail
          NOW="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq \
            --arg version "$RELEASE_VERSION" \
            --arg hash "$EXPECTED_SHA256" \
            --arg now "$NOW" \
            '.currentVersion=$version
             | .status.validation="passed"
             | .status.githubRelease="awaiting-production-workflow"
             | .status.greasyForkSync="release-webhook-configured"
             | .status.backup="private-repository-ready"
             | .source={canonicalPath:"src/MissionChief_Map_Command_Toolkit.user.js",validatedSha256:$hash,state:"validated-canonical-source"}
             | .distributionCandidate={path:"dist/MissionChief_Map_Command_Toolkit.user.js",version:$version,state:"validated"}
             | .lastUpdated=$now' \
            status/release-dashboard.json > status/release-dashboard.tmp
          mv status/release-dashboard.tmp status/release-dashboard.json

      - name: Commit canonical v4.11.0 source
        id: source_commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/MissionChief_Map_Command_Toolkit.user.js \
            dist/MissionChief_Map_Command_Toolkit.user.js \
            dist/MissionChief_Map_Command_Toolkit.txt \
            dist/SHA256SUMS.txt \
            dist/release-manifest.json \
            CHANGELOG.md README.md status/release-dashboard.json \
            .github/workflows/release-readiness-check.yml
          git commit -m "Add Toolkit v4.11.0 Smart Bookmark Labels"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run Release Readiness Check
        id: readiness
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ steps.source_commit.outputs.sha }}"
          gh workflow run release-readiness-check.yml --ref main --field version="$RELEASE_VERSION"
          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID="$(gh run list --workflow release-readiness-check.yml --branch main --event workflow_dispatch --limit 10 --json databaseId,headSha --jq '.[] | select(.headSha == "'"$HEAD_SHA"'") | .databaseId' | head -n 1)"
            [[ -n "$RUN_ID" ]] && break
            sleep 5
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::Could not identify the Release Readiness run."; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --exit-status --interval 10

      - name: Run production Release Toolkit pipeline
        id: release
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ steps.source_commit.outputs.sha }}"
          gh workflow run release-toolkit.yml --ref main \
            --field version="$RELEASE_VERSION" \
            --field confirmation="RELEASE"
          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID="$(gh run list --workflow release-toolkit.yml --branch main --event workflow_dispatch --limit 10 --json databaseId,headSha --jq '.[] | select(.headSha == "'"$HEAD_SHA"'") | .databaseId' | head -n 1)"
            [[ -n "$RUN_ID" ]] && break
            sleep 5
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::Could not identify the production release run."; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --exit-status --interval 15

      - name: Write completion summary
        shell: bash
        run: |
          {
            echo "# Toolkit v${RELEASE_VERSION} Smart Bookmark Labels"
            echo
            echo "- ✅ Exact v${BASELINE_VERSION} source restored and hash verified"
            echo "- ✅ Smart Bookmark Labels patch applied"
            echo "- ✅ Canonical source hash verified: \`${EXPECTED_SHA256}\`"
            echo "- ✅ JavaScript syntax and repository validation passed"
            echo "- ✅ Byte-identical distribution files built"
            echo "- ✅ Release Readiness Check passed"
            echo "- ✅ Production Release Toolkit workflow completed"
          } >> "$GITHUB_STEP_SUMMARY"
