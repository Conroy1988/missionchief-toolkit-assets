name: Agent inspect monospaced notes integration

on:
  push:
    branches:
      - agent/monospaced-mission-notes
    paths-ignore:
      - agent-inspection.txt
      - agent-targeted.txt
      - agent-ui-sync.txt

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/monospaced-mission-notes
      - name: Persist UI synchronisation anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('src/MissionChief_Map_Command_Toolkit.user.js')
          output_path = Path('agent-ui-sync.txt')
          lines = source_path.read_text(encoding='utf-8').splitlines()
          report = []

          def add_range(start, end, title):
              report.append(f"\n===== {title} · source lines {start}-{end} =====")
              for n in range(max(1, start), min(len(lines), end) + 1):
                  report.append(f"{n:06d}: {lines[n - 1]}")

          for start, end, title in [
              (29210, 29550, 'post-toggle and UI state'),
              (29551, 29879, 'UI update and control creation'),
              (30420, 30780, 'setting changes and UI refresh'),
          ]:
              add_range(start, end, title)

          patterns = [
              'function updateUI',
              'dataset.toggle',
              "querySelectorAll('[data-toggle]')",
              'querySelectorAll("[data-toggle]")',
              'toggleButton.dataset.toggle',
              "feature === 'shortcuts'",
              'mcms-pill',
          ]
          seen = set()
          for pattern in patterns:
              matches = [i for i, line in enumerate(lines) if pattern in line]
              report.append(f"\n===== MATCH {pattern!r} · {len(matches)} =====")
              for i in matches[:40]:
                  start = max(0, i - 14)
                  end = min(len(lines), i + 15)
                  key = (start, end)
                  if key in seen:
                      continue
                  seen.add(key)
                  report.extend(f"{n + 1:06d}: {lines[n]}" for n in range(start, end))

          output_path.write_text("\n".join(report) + "\n", encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add agent-ui-sync.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record monospaced notes UI anchors [skip ci]"
            git push origin HEAD:agent/monospaced-mission-notes
          fi
