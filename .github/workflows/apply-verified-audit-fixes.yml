name: Apply Verified Audit Fixes

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
    paths:
      - ".github/scripts/apply_verified_audit_fixes.py"
      - ".github/workflows/apply-verified-audit-fixes.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out audit branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply assertion-backed safe fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/apply_verified_audit_fixes.py \
            src/MissionChief_Map_Command_Toolkit.user.js \
            dist/MissionChief_Map_Command_Toolkit.user.js \
            --report verified-audit-fixes.md
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          cmp -s src/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.user.js

      - name: Commit verified source fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.user.js
          if git diff --cached --quiet; then
            echo "Verified fixes were already applied."
            exit 0
          fi
          git commit -m "Apply verified userscript audit fixes"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload transformation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-userscript-audit-fixes
          path: verified-audit-fixes.md
          if-no-files-found: warn
          retention-days: 30
