name: Greasy Fork Discord Update

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/greasyfork-discord-update.yml"
      - ".github/scripts/extract_greasyfork_changelog.py"
      - ".github/scripts/test_extract_greasyfork_changelog.py"

permissions:
  contents: write

concurrency:
  group: greasyfork-update-monitor
  cancel-in-progress: false

jobs:
  check-for-update:
    name: Check Greasy Fork Version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Test changelog extractor
        shell: bash
        run: python3 .github/scripts/test_extract_greasyfork_changelog.py

      - name: Read Greasy Fork version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          META_URL="https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.meta.js"
          STATE_FILE=".github/greasyfork-version.txt"

          # Safe defaults: temporary Greasy Fork failures are retried by the next
          # scheduled run and do not create failed-run emails.
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "current=" >> "$GITHUB_OUTPUT"
          echo "previous=" >> "$GITHUB_OUTPUT"

          if ! curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --compressed \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --header "Cache-Control: no-cache" \
            "${META_URL}?cache_bust=$(date +%s%N)" \
            --output greasyfork-script.meta.js; then
            echo "::warning::Greasy Fork metadata is temporarily unavailable. The next scheduled run will retry."
            exit 0
          fi

          CURRENT_VERSION="$(
            sed -nE \
              's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' \
              greasyfork-script.meta.js |
              head -n 1 |
              xargs
          )"

          if [[ -z "$CURRENT_VERSION" ]]; then
            echo "::warning::Could not detect @version from Greasy Fork. The next scheduled run will retry."
            exit 0
          fi

          if [[ ! "$CURRENT_VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "::warning::Greasy Fork returned an unexpected version value. The next scheduled run will retry."
            exit 0
          fi

          if [[ -f "$STATE_FILE" ]]; then
            PREVIOUS_VERSION="$(tr -d '\r\n ' < "$STATE_FILE")"
          else
            PREVIOUS_VERSION=""
          fi

          echo "Current Greasy Fork version: $CURRENT_VERSION"
          echo "Previously announced version: ${PREVIOUS_VERSION:-none}"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [[ -n "$PREVIOUS_VERSION" && "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read new Greasy Fork changelog entries
        id: changelog
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version.outputs.previous }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION_API_URL="https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions.json?show_all_versions=1&list_all=1"
          HISTORY_URLS=(
            "https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions.html?show_all_versions=1&list_all=1"
            "https://greasyfork.org/en/scripts/586018/versions.html?show_all_versions=1&list_all=1"
          )
          BROWSER_UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36"

          rm -f greasyfork-versions.json greasyfork-history.html greasyfork-changelog.txt
          echo "ready=false" >> "$GITHUB_OUTPUT"

          # First use Greasy Fork's JSON versions endpoint. It is more reliable
          # than the rendered History page and confirms that both boundaries exist.
          API_READY=false
          for attempt in 1 2 3; do
            echo "Checking Greasy Fork versions API (attempt $attempt of 3)..."
            rm -f greasyfork-versions.json

            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --compressed \
              --http1.1 \
              --max-time 30 \
              --retry 2 \
              --retry-delay 3 \
              --header "Accept: application/json" \
              --header "Accept-Language: en-GB,en;q=0.9" \
              --header "Cache-Control: no-cache" \
              --user-agent "$BROWSER_UA" \
              "${VERSION_API_URL}&cache_bust=$(date +%s%N)" \
              --output greasyfork-versions.json; then

              if jq -e \
                --arg current "$CURRENT_VERSION" \
                --arg previous "$PREVIOUS_VERSION" \
                '
                  type == "array"
                  and length > 0
                  and .[0].version == $current
                  and (
                    if $previous == ""
                    then true
                    else any(.[]; .version == $previous)
                    end
                  )
                ' greasyfork-versions.json >/dev/null; then
                API_READY=true
                break
              fi

              echo "Versions API has not exposed the complete range yet."
              jq -r '.[0:8][]?.version' greasyfork-versions.json 2>/dev/null | paste -sd ', ' - || true
            fi

            if [[ "$attempt" -lt 3 ]]; then
              sleep 8
            fi
          done

          if [[ "$API_READY" != true ]]; then
            echo "::warning::Greasy Fork has published the metadata version, but its versions API has not caught up yet. No Discord post was sent; the next scheduled run will retry."
            exit 0
          fi

          # The JSON API deliberately omits changelog text, so fetch the rendered
          # History page only after the API confirms the new version is available.
          PAGE_MATCHED=false
          for attempt in 1 2 3 4; do
            echo "Reading Greasy Fork History $PREVIOUS_VERSION -> $CURRENT_VERSION (attempt $attempt of 4)..."

            for HISTORY_URL in "${HISTORY_URLS[@]}"; do
              rm -f greasyfork-history.html greasyfork-changelog.txt

              if curl \
                --fail \
                --silent \
                --show-error \
                --location \
                --compressed \
                --http1.1 \
                --max-time 30 \
                --retry 2 \
                --retry-delay 3 \
                --header "Accept: text/html,application/xhtml+xml" \
                --header "Accept-Language: en-GB,en;q=0.9" \
                --header "Cache-Control: no-cache" \
                --header "Pragma: no-cache" \
                --referer "https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit" \
                --user-agent "$BROWSER_UA" \
                "${HISTORY_URL}&cache_bust=$(date +%s%N)" \
                --output greasyfork-history.html; then

                echo "Downloaded History HTML: $(wc -c < greasyfork-history.html) bytes"

                if python3 .github/scripts/extract_greasyfork_changelog.py \
                  "$CURRENT_VERSION" \
                  "$PREVIOUS_VERSION" \
                  greasyfork-history.html \
                  greasyfork-changelog.txt; then
                  PAGE_MATCHED=true
                  break 2
                fi
              fi
            done

            if [[ "$attempt" -lt 4 ]]; then
              sleep 10
            fi
          done

          if [[ "$PAGE_MATCHED" != true || ! -f greasyfork-changelog.txt ]]; then
            echo "::warning::Greasy Fork's versions API contains $CURRENT_VERSION, but the rendered History page is not readable yet. No Discord post was sent; the next scheduled run will retry."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

          if [[ -s greasyfork-changelog.txt ]]; then
            echo "Changelog to send:"
            cat greasyfork-changelog.txt
          else
            echo "No new changelog text was entered for the unannounced versions."
          fi

      - name: Post update to Discord
        if: steps.version.outputs.changed == 'true' && steps.changelog.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATE_WEBHOOK }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version.outputs.previous }}
          SCRIPT_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit
          HISTORY_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions
          INSTALL_URL: https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "::error::The DISCORD_UPDATE_WEBHOOK repository secret has not been configured."
            exit 1
          fi

          CHANGELOG="$(cat greasyfork-changelog.txt 2>/dev/null || true)"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg current "$CURRENT_VERSION" \
            --arg previous "$PREVIOUS_VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg script_url "$SCRIPT_URL" \
            --arg history_url "$HISTORY_URL" \
            --arg install_url "$INSTALL_URL" \
            --arg timestamp "$TIMESTAMP" \
            '{
              username: "MissionChief Toolkit Updates",
              allowed_mentions: { parse: [] },
              embeds: [
                {
                  title: "MissionChief Map Command Toolkit Updated",
                  description: "A new version of the toolkit is now live on Greasy Fork.",
                  url: $script_url,
                  color: 3447003,
                  fields: (
                    [
                      { name: "Previous Version", value: ("`" + $previous + "`"), inline: true },
                      { name: "New Version", value: ("`" + $current + "`"), inline: true }
                    ]
                    +
                    (if ($changelog | length) > 0 then
                      [{ name: "What Changed", value: $changelog, inline: false }]
                    else
                      []
                    end)
                    +
                    [
                      {
                        name: "Update",
                        value: ("[View on Greasy Fork](" + $script_url + ")\n[View version history](" + $history_url + ")\n[Install or update the script](" + $install_url + ")"),
                        inline: false
                      }
                    ]
                  ),
                  footer: { text: "MissionChief Map Command Toolkit" },
                  timestamp: $timestamp
                }
              ]
            }' > discord-payload.json

          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "Content-Type: application/json" \
            --data @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}?wait=true"

          echo
          echo "Discord update notification sent."

      - name: Save latest announced version
        if: steps.version.outputs.changed == 'true' && steps.changelog.outputs.ready == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          STATE_FILE=".github/greasyfork-version.txt"
          printf '%s\n' "$CURRENT_VERSION" > "$STATE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "No version-state change to commit."
            exit 0
          fi

          git commit -m "Track Greasy Fork version ${CURRENT_VERSION}"
          git push
