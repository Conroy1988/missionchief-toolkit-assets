name: Apply Issue 306 Candidate

on:
  push:
    branches:
      - agent/issue-306-matrix-reconciliation
    paths:
      - ".github/workflows/temporary-issue306-apply.yml"

permissions:
  contents: write

concurrency:
  group: issue-306-candidate-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Reconstruct reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/issue306.patch.part* | base64 --decode | gzip --decompress > /tmp/issue306.patch
          git apply --check /tmp/issue306.patch
          git apply /tmp/issue306.patch

      - name: Remove temporary transfer machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -f .automation/issue306.patch.part*
          rm -f .automation/repository-export-run-id.txt
          rm -f .github/workflows/temporary-repository-export.yml
          rm -f .github/workflows/temporary-issue306-apply.yml
          rmdir .automation 2>/dev/null || true

      - name: Validate candidate
        shell: bash
        run: |
          set -euo pipefail
          cp src/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.user.js
          cp src/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt
          python3 .github/scripts/validate_userscript.py
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          bash .github/scripts/run_userscript_preflight.sh --contracts

      - name: Commit reviewed candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Fix Mission Matrix personnel and BASU reconciliation (#306)"
          git push origin HEAD:agent/issue-306-matrix-reconciliation
