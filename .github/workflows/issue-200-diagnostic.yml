name: Issue 200 Version UI Diagnostic

on:
  push:
    branches:
      - feature/issue-200-version-status-ui

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Run exact package and report validation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          package='.github/development-packages/issue-200-version-status-ui.py'
          report="$RUNNER_TEMP/issue-200-diagnostic.log"
          body="$RUNNER_TEMP/issue-200-comment.md"

          python3 "$package" >"$report" 2>&1
          package_status=$?
          rm -f .github/workflows/issue-200-diagnostic.yml
          find .github/development-packages -type d -empty -delete 2>/dev/null || true

          validation_status=99
          syntax_status=99
          parity_status=99
          if [[ $package_status -eq 0 ]]; then
            python3 .github/scripts/validate_userscript.py >>"$report" 2>&1
            validation_status=$?
            node --check src/MissionChief_Map_Command_Toolkit.user.js >>"$report" 2>&1
            syntax_status=$?
            cmp --silent dist/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt
            parity_status=$?
          fi

          {
            echo '### Issue #200 validation diagnostic'
            echo
            echo "- Package: \`$package_status\`"
            echo "- Canonical validator: \`$validation_status\`"
            echo "- JavaScript syntax: \`$syntax_status\`"
            echo "- Distribution parity: \`$parity_status\`"
            echo
            echo '<details><summary>Last 140 diagnostic lines</summary>'
            echo
            echo '```text'
            tail -n 140 "$report"
            echo '```'
            echo '</details>'
          } >"$body"
          gh issue comment 200 --repo "$GITHUB_REPOSITORY" --body-file "$body"
