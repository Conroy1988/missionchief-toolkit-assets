name: Issue 153 Build Runtime Package

on:
  push:
    branches:
      - feature/issue-153-version-status-v2

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feature/issue-153-version-status-v2
          fetch-depth: 0
      - name: Rebuild source-only guarded package
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/issue-153-version-status:refs/remotes/origin/feature/issue-153-version-status
          mkdir -p .github/development-packages
          git show origin/feature/issue-153-version-status:.github/development-packages/issue-153-version-status.jsfrag > .github/development-packages/issue-153-version-status.jsfrag
          git show origin/feature/issue-153-version-status:.github/development-packages/issue-153-version-status.py > /tmp/issue-153-package.py

          python3 - <<'PY'
          from pathlib import Path

          source = Path('/tmp/issue-153-package.py').read_text(encoding='utf-8')

          source = source.replace('DIAGNOSTIC = ROOT / ".github" / "development-packages" / "issue-153-diagnostic.txt"\n', '')
          source = source.replace('RELEASE_WORKFLOW = ROOT / ".github" / "workflows" / "release-toolkit.yml"\n', '')
          source = source.replace('WORKFLOW = ROOT / ".github" / "workflows" / "release-toolkit.yml"', 'WORKFLOW = ROOT / ".github" / "workflows" / "publish-update-manifest.yml"')

          marker_start = source.index('    for marker in [\n        "status/update-manifest.json",')
          marker_end = source.index('\n\n    result = subprocess.run(["node", str(RUNTIME)], cwd=ROOT)', marker_start)
          marker_replacement = '''    for marker in [
        "workflow_run:",
        "- Release Toolkit",
        "github.event.workflow_run.conclusion == 'success'",
        "github.event.workflow_run.head_branch == 'main'",
        "Build manifest from verified release ledger",
        "status/update-manifest.json",
        "'githubRelease': 'published'",
        "'greasyForkSync': 'verified'",
        "'backup': 'private-repository-verified'",
        "'discordRelease': 'posted'",
        "git push origin HEAD:main",
    ]:
        assert marker in workflow, f"verified manifest workflow marker missing: {marker}"
    trigger_index = workflow.index("workflow_run:")
    build_index = workflow.index("Build manifest from verified release ledger")
    push_index = workflow.index("git push origin HEAD:main")
    assert trigger_index < build_index < push_index, "manifest publication must follow successful release reconciliation"
'''
          source = source[:marker_start] + marker_replacement + source[marker_end:]

          release_start = source.index('\nrelease = RELEASE_WORKFLOW.read_text(encoding="utf-8")')
          release_end = source.index('\nchangelog = CHANGELOG.read_text(encoding="utf-8")', release_start)
          source = source[:release_start] + source[release_end:]
          source = source.replace('DIAGNOSTIC.unlink(missing_ok=True)\n', '')

          Path('.github/development-packages/issue-153-version-status.py').write_text(source, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/development-packages/issue-153-version-status.jsfrag .github/development-packages/issue-153-version-status.py
          git commit -m "Prepare source-only Issue 153 runtime package"
          git push origin HEAD:feature/issue-153-version-status-v2
