name: Greasy Fork Discord Update

on:
  schedule:
    # Check Greasy Fork every 5 minutes
    - cron: "*/5 * * * *"

  # Adds a button so the workflow can also be tested manually
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: greasyfork-update-monitor
  cancel-in-progress: false

jobs:
  check-for-update:
    name: Check Greasy Fork Version
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read Greasy Fork version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          META_URL="https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.meta.js"
          STATE_FILE=".github/greasyfork-version.txt"

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            "$META_URL" \
            --output greasyfork-script.meta.js

          CURRENT_VERSION="$(
            sed -nE \
              's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' \
              greasyfork-script.meta.js |
              head -n 1 |
              xargs
          )"

          if [[ -z "$CURRENT_VERSION" ]]; then
            echo "::error::Could not detect the @version value from Greasy Fork."
            exit 1
          fi

          if [[ -f "$STATE_FILE" ]]; then
            PREVIOUS_VERSION="$(tr -d '\r\n ' < "$STATE_FILE")"
          else
            PREVIOUS_VERSION=""
          fi

          echo "Current Greasy Fork version: $CURRENT_VERSION"
          echo "Previously recorded version: ${PREVIOUS_VERSION:-none}"

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [[ -n "$PREVIOUS_VERSION" && "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read Greasy Fork changelog
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          HISTORY_URL="https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions?show_all_versions=1&list_all=1"
          rm -f greasyfork-history.html greasyfork-changelog.txt greasyfork-version-found

          # Greasy Fork can take a few seconds to expose the newest History entry.
          for attempt in 1 2 3 4 5 6; do
            echo "Reading changelog for version $CURRENT_VERSION (attempt $attempt of 6)..."

            if ! curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --max-time 30 \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "Mozilla/5.0 GitHub-Actions Greasy-Fork-Update-Monitor" \
              "${HISTORY_URL}&cache_bust=$(date +%s%N)" \
              --output greasyfork-history.html; then
              echo "::warning::Could not download the Greasy Fork History page on attempt $attempt."
              if [[ "$attempt" -lt 6 ]]; then
                sleep 10
                continue
              fi
              break
            fi

            python3 - "$CURRENT_VERSION" <<'PY'
          import re
          import sys
          from html.parser import HTMLParser
          from pathlib import Path

          target_version = sys.argv[1].strip().lstrip("vV")
          html = Path("greasyfork-history.html").read_text(encoding="utf-8", errors="replace")


          class HistoryParser(HTMLParser):
              BLOCK_TAGS = {"br", "p", "div", "ul", "ol", "h1", "h2", "h3", "h4", "h5", "h6"}
              VOID_TAGS = {"area", "base", "br", "col", "embed", "hr", "img", "input", "link", "meta", "param", "source", "track", "wbr"}

              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.in_history = False
                  self.history_ul_depth = 0
                  self.in_entry = False
                  self.entry_depth = 0
                  self.version_depth = 0
                  self.changelog_depth = 0
                  self.version_parts = []
                  self.changelog_parts = []
                  self.entries = []

              @staticmethod
              def classes(attrs):
                  return set(dict(attrs).get("class", "").split())

              def handle_starttag(self, tag, attrs):
                  classes = self.classes(attrs)

                  if tag == "ul" and "history_versions" in classes and not self.in_history:
                      self.in_history = True
                      self.history_ul_depth = 1
                      return

                  if self.in_history:
                      if tag == "ul":
                          self.history_ul_depth += 1

                      if tag == "li" and not self.in_entry:
                          self.in_entry = True
                          self.entry_depth = 1
                          self.version_parts = []
                          self.changelog_parts = []
                          return

                  if self.in_entry:
                      if tag == "li":
                          self.entry_depth += 1

                      if tag == "span" and "version-number" in classes and self.version_depth == 0:
                          self.version_depth = 1
                      elif self.version_depth and tag not in self.VOID_TAGS:
                          self.version_depth += 1

                      if tag == "span" and "version-changelog" in classes and self.changelog_depth == 0:
                          self.changelog_depth = 1
                      elif self.changelog_depth:
                          if tag == "li":
                              self.changelog_parts.append("\n• ")
                          elif tag in self.BLOCK_TAGS:
                              self.changelog_parts.append("\n")
                          if tag not in self.VOID_TAGS:
                              self.changelog_depth += 1

              def handle_startendtag(self, tag, attrs):
                  if self.in_entry and self.changelog_depth and tag == "br":
                      self.changelog_parts.append("\n")

              def handle_endtag(self, tag):
                  if self.in_entry:
                      if self.version_depth:
                          self.version_depth -= 1

                      if self.changelog_depth:
                          if tag in self.BLOCK_TAGS:
                              self.changelog_parts.append("\n")
                          self.changelog_depth -= 1

                      if tag == "li":
                          self.entry_depth -= 1
                          if self.entry_depth == 0:
                              self.entries.append(("".join(self.version_parts), "".join(self.changelog_parts)))
                              self.in_entry = False

                  if self.in_history and tag == "ul":
                      self.history_ul_depth -= 1
                      if self.history_ul_depth == 0:
                          self.in_history = False

              def handle_data(self, data):
                  if self.in_entry and self.version_depth:
                      self.version_parts.append(data)
                  if self.in_entry and self.changelog_depth:
                      self.changelog_parts.append(data)


          def clean_text(value):
              value = value.replace("\u00a0", " ")
              value = re.sub(r"[ \t]+", " ", value)
              lines = [line.strip() for line in value.splitlines()]
              lines = [line for line in lines if line]
              return "\n".join(lines).strip()


          parser = HistoryParser()
          parser.feed(html)

          for raw_version, raw_changelog in parser.entries:
              version_match = re.search(r"(?:^|\s)v?([0-9][0-9A-Za-z._+-]*)", clean_text(raw_version))
              if not version_match:
                  continue

              version = version_match.group(1).lstrip("vV")
              if version != target_version:
                  continue

              changelog = clean_text(raw_changelog)
              if len(changelog) > 950:
                  changelog = changelog[:947].rstrip() + "..."

              Path("greasyfork-version-found").write_text("yes\n", encoding="utf-8")
              Path("greasyfork-changelog.txt").write_text(changelog, encoding="utf-8")
              break
          PY

            if [[ -f greasyfork-version-found ]]; then
              break
            fi

            if [[ "$attempt" -lt 6 ]]; then
              sleep 10
            fi
          done

          if [[ ! -f greasyfork-version-found ]]; then
            echo "::warning::The new version was found in metadata, but its History entry was not available yet. Posting without a changelog."
            : > greasyfork-changelog.txt
          elif [[ -s greasyfork-changelog.txt ]]; then
            echo "Changelog found:"
            cat greasyfork-changelog.txt
          else
            echo "The version was found, but no changelog was entered."
          fi

      - name: Post update to Discord
        if: steps.version.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATE_WEBHOOK }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version.outputs.previous }}
          SCRIPT_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit
          HISTORY_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions
          INSTALL_URL: https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "::error::The DISCORD_UPDATE_WEBHOOK repository secret has not been configured."
            exit 1
          fi

          if [[ -f greasyfork-changelog.txt ]]; then
            CHANGELOG="$(cat greasyfork-changelog.txt)"
          else
            CHANGELOG=""
          fi

          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg current "$CURRENT_VERSION" \
            --arg previous "$PREVIOUS_VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg script_url "$SCRIPT_URL" \
            --arg history_url "$HISTORY_URL" \
            --arg install_url "$INSTALL_URL" \
            --arg timestamp "$TIMESTAMP" \
            '{
              username: "MissionChief Toolkit Updates",
              allowed_mentions: {
                parse: []
              },
              embeds: [
                {
                  title: "MissionChief Map Command Toolkit Updated",
                  description: "A new version of the toolkit is now live on Greasy Fork.",
                  url: $script_url,
                  color: 3447003,
                  fields: (
                    [
                      {
                        name: "Previous Version",
                        value: ("`" + $previous + "`"),
                        inline: true
                      },
                      {
                        name: "New Version",
                        value: ("`" + $current + "`"),
                        inline: true
                      }
                    ]
                    +
                    (if ($changelog | length) > 0 then
                      [
                        {
                          name: "What Changed",
                          value: $changelog,
                          inline: false
                        }
                      ]
                    else
                      []
                    end)
                    +
                    [
                      {
                        name: "Update",
                        value: ("[View on Greasy Fork](" + $script_url + ")\n[View version history](" + $history_url + ")\n[Install or update the script](" + $install_url + ")"),
                        inline: false
                      }
                    ]
                  ),
                  footer: {
                    text: "MissionChief Map Command Toolkit"
                  },
                  timestamp: $timestamp
                }
              ]
            }' > discord-payload.json

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}?wait=true"

          echo
          echo "Discord update notification sent."

      - name: Save latest version
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          STATE_FILE=".github/greasyfork-version.txt"

          printf '%s\n' "$CURRENT_VERSION" > "$STATE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "No version-state change to commit."
            exit 0
          fi

          git commit -m "Track Greasy Fork version ${CURRENT_VERSION}"
          git push
