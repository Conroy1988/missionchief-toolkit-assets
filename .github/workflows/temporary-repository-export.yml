name: Apply Issue 159 Candidate

on:
  push:
    branches:
      - agent/issue-159-financial-overview
    paths:
      - ".github/workflows/temporary-repository-export.yml"

permissions:
  contents: write

concurrency:
  group: issue-159-candidate-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/issue-159-financial-overview
          fetch-depth: 0

      - name: Reconstruct and verify reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/issue159.patch.part* > /tmp/issue159.patch.b64
          [[ "$(wc -c < /tmp/issue159.patch.b64)" -eq 52912 ]]
          echo "781b9c69ced5d90628cdadc736524eca7efd981f25e0aa84c2d5985973576c73  /tmp/issue159.patch.b64" | sha256sum --check --strict
          base64 --decode /tmp/issue159.patch.b64 | gzip --decompress > /tmp/issue159.patch
          echo "6e21d2a8a64d8e00866f15b4a97bb4321cb489239b1fd3f3fa78c36e8423d5f5  /tmp/issue159.patch" | sha256sum --check --strict
          git apply --check /tmp/issue159.patch
          git apply /tmp/issue159.patch

      - name: Remove transfer chunks
        shell: bash
        run: |
          set -euo pipefail
          rm -f .automation/issue159.patch.part*
          rmdir .automation 2>/dev/null || true

      - name: Validate candidate
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          python3 .github/scripts/validate_userscript.py
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          bash .github/scripts/run_userscript_preflight.sh --contracts
          python3 .github/scripts/check_documentation_drift.py --allow-release-candidate
          git checkout -- documentation-drift-report.json documentation-drift-report.md

      - name: Commit validated product candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/temporary-repository-export.yml'
          git status --short
          git commit -m "Reconcile Financial Advisor with credits overview totals (#159)"
          git push origin HEAD:agent/issue-159-financial-overview
