name: One-time Hyrule Source Scan File

on:
  push:
    branches: [main]
    paths: [.github/workflows/v4130-source-scan-file-once.yml]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Generate architecture report
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          src=Path('src/MissionChief_Map_Command_Toolkit.user.js')
          lines=src.read_text(encoding='utf-8').splitlines()
          patterns=[
            ('THEME_NAMES', re.compile(r'Cyberpunk|Umbrella|Factorio|Fallout|007',re.I)),
            ('THEME_CONTROL', re.compile(r'theme(?:Select|Options|Name|Key|Id|Label)|applyTheme|interfaceTheme|data-mcms-theme',re.I)),
            ('PAYOUT', re.compile(r'payout(?:Template|Style|Theme|Flash|Audio)|cashout|completionHistory|completion history',re.I)),
            ('ASSETS', re.compile(r'raw\.githubusercontent|\.mp3|assetUrl|ASSET',re.I)),
          ]
          out=[]
          for label,rx in patterns:
            out.append(f'\n===== {label} =====\n')
            count=0
            for i,line in enumerate(lines):
              if not rx.search(line): continue
              start=max(0,i-2); end=min(len(lines),i+3)
              out.append('\n'.join(f'{n+1}: {lines[n]}' for n in range(start,end)))
              out.append('---')
              count+=1
              if count>=120: break
          Path('diagnostics').mkdir(exist_ok=True)
          Path('diagnostics/hyrule-architecture.txt').write_text('\n'.join(out),encoding='utf-8')
          PY
          git checkout -B feature/hyrule-command-v4130-final
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/hyrule-architecture.txt
          git commit -m "Add temporary Hyrule architecture scan"
          git push --force origin feature/hyrule-command-v4130-final
      - name: Remove scanner
        shell: bash
        run: |
          git checkout -B main origin/main
          git rm .github/workflows/v4130-source-scan-file-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove Hyrule source scan workflow"
          git pull --rebase origin main
          git push origin main
