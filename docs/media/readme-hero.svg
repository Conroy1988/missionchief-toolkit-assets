        <text x="49" y="33" fill="#ccefff" font-size="12" font-weight="850" letter-spacing="1.5">v4.20.29 · iOS SAFARI HARDENING</text>
        <text x="22" y="59" fill="#ffffff" font-size="15" font-weight="800">Safe areas · visual viewport · 44px touch targets · split view</text>
        <text x="22" y="76" fill="#88a9bc" font-size="10">iPhone and iPad workflows without weakening desktop behaviour</text>
      </g>

      <g transform="translate(42 248)">
        <rect width="248" height="87" rx="17" fill="#101d2e" stroke="#75cfff" stroke-opacity="0.27"/>
        <text x="18" y="27" fill="#8ddcff" font-size="11" font-weight="850" letter-spacing="1.2">MISSION MONITORING</text>
        <text x="18" y="51" fill="#ffffff" font-size="15" font-weight="800">Spawn + Stuck Detector</text>
        <text x="18" y="70" fill="#859cad" font-size="10">v4.20.32 isolated routing</text>
      </g>
      <g transform="translate(308 248)">
        <rect width="248" height="87" rx="17" fill="url(#redPanel)" stroke="#ef6572" stroke-opacity="0.30"/>
        <text x="18" y="27" fill="#ff9ca5" font-size="11" font-weight="850" letter-spacing="1.2">INTERFACE SHELL</text>
        <text x="18" y="51" fill="#ffffff" font-size="15" font-weight="800">Clean + Shortcuts + Dock</text>
        <text x="18" y="70" fill="#ad8e95" font-size="10">v4.20.33 isolated routing</text>
      </g>

