name: Issue 203 Artifact Diagnostic

on:
  push:
    branches:
      - fix/issue-203-version-control-family
    paths:
      - .github/workflows/issue-203-artifact-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run package and validator
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/issue-203-diagnostic.log"
          python .github/development-packages/issue-203-version-control-family.py > "$LOG" 2>&1
          echo "package_status=$?" >> "$LOG"
          python .github/scripts/validate_userscript.py >> "$LOG" 2>&1
          echo "validator_status=$?" >> "$LOG"
          node --check src/MissionChief_Map_Command_Toolkit.user.js >> "$LOG" 2>&1
          echo "syntax_status=$?" >> "$LOG"
          cmp -s src/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.user.js
          echo "parity_status=$?" >> "$LOG"
          cp "$LOG" issue-203-diagnostic.log
      - uses: actions/upload-artifact@v4
        with:
          name: issue-203-diagnostic
          path: issue-203-diagnostic.log
          retention-days: 1
