name: Apply Issue 64 Toggle Candidate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-issue64-toggle-export.yml"
      - ".github/development-packages/issue64-toggle-v42027-part-*.b64"

permissions:
  contents: write

concurrency:
  group: issue64-toggle-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/development-packages/issue64-toggle-v42027-part-00.b64 \
            .github/development-packages/issue64-toggle-v42027-part-01a.b64 \
            .github/development-packages/issue64-toggle-v42027-part-01b.b64 \
            .github/development-packages/issue64-toggle-v42027-part-01c.b64 \
            .github/development-packages/issue64-toggle-v42027-part-02.b64 \
            .github/development-packages/issue64-toggle-v42027-part-03.b64 \
            .github/development-packages/issue64-toggle-v42027-part-04.b64 \
            > /tmp/issue64-toggle-v42027.patch.gz.b64
          echo "a468dc0a00a44e138f7973c629d00a6a3613de9fe77203e7625e3c9cb0584eba  /tmp/issue64-toggle-v42027.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/issue64-toggle-v42027.patch.gz.b64 > /tmp/issue64-toggle-v42027.patch.gz
          gzip -dc /tmp/issue64-toggle-v42027.patch.gz > /tmp/issue64-toggle-v42027.patch
          echo "4b650852e065914c60550c2c9e56bff54d06db91630394cbd77c2327a8176c3e  /tmp/issue64-toggle-v42027.patch" | sha256sum -c -
          git apply --check /tmp/issue64-toggle-v42027.patch
          git apply /tmp/issue64-toggle-v42027.patch

      - name: Prove intended change boundary
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected-files.txt <<'EOF'
          .github/fixtures/main-style-source-headroom.json
          .github/fixtures/settings-ui-contract.json
          .github/scripts/test_settings_ui_contract.py
          CHANGELOG.md
          MissionChief_Map_Command_Toolkit.txt
          MissionChief_Map_Command_Toolkit.user.js
          dist/MissionChief_Map_Command_Toolkit.txt
          dist/MissionChief_Map_Command_Toolkit.user.js
          dist/SHA256SUMS.txt
          dist/release-manifest.json
          help/index.html
          src/MissionChief_Map_Command_Toolkit.user.js
          EOF
          sort -o /tmp/expected-files.txt /tmp/expected-files.txt
          git diff --name-only | sort > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt

      - name: Run canonical and deterministic validation
        shell: bash
        run: |
          set -euo pipefail
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/validate_userscript.py
          bash .github/scripts/run_userscript_preflight.sh --contracts
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/check_documentation_drift.py --allow-release-candidate

      - name: Run performance and integrity validation
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:src/MissionChief_Map_Command_Toolkit.user.js > /tmp/issue64-toggle-base.user.js
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/test_performance_budget.py
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/test_runtime_optimisations.py
          node --check tools/mcms-performance-profiler.user.js
          node .github/scripts/test_performance_profiler.js
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/check_performance_budget.py \
            --candidate src/MissionChief_Map_Command_Toolkit.user.js \
            --base /tmp/issue64-toggle-base.user.js \
            --policy .github/performance-budget.json \
            --json-output performance-budget-report.json \
            --markdown-output performance-budget-report.md
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/test_code_integrity.py
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/check_code_integrity.py \
            --candidate src/MissionChief_Map_Command_Toolkit.user.js \
            --base /tmp/issue64-toggle-base.user.js \
            --policy .github/code-integrity-policy.json \
            --json-output code-integrity-report.json \
            --markdown-output code-integrity-report.md

      - name: Run permanent-workflow security audit
        shell: bash
        run: |
          set -euo pipefail
          mv .github/workflows/temporary-issue64-toggle-export.yml /tmp/temporary-issue64-toggle-export.yml
          trap 'mv /tmp/temporary-issue64-toggle-export.yml .github/workflows/temporary-issue64-toggle-export.yml' EXIT
          PYTHONDONTWRITEBYTECODE=1 python3 .github/scripts/audit_actions_security.py

      - name: Prepare final product diff
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- documentation-drift-report.json documentation-drift-report.md status/release-dashboard.json status/repository-audit.json status/repository-audit.md 2>/dev/null || true
          rm -f performance-budget-report.json performance-budget-report.md
          rm -f code-integrity-report.json code-integrity-report.md
          rm -f actions-security-report.json actions-security-report.md
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          cat > /tmp/expected-files.txt <<'EOF'
          .github/fixtures/main-style-source-headroom.json
          .github/fixtures/settings-ui-contract.json
          .github/scripts/test_settings_ui_contract.py
          CHANGELOG.md
          MissionChief_Map_Command_Toolkit.txt
          MissionChief_Map_Command_Toolkit.user.js
          dist/MissionChief_Map_Command_Toolkit.txt
          dist/MissionChief_Map_Command_Toolkit.user.js
          dist/SHA256SUMS.txt
          dist/release-manifest.json
          help/index.html
          src/MissionChief_Map_Command_Toolkit.user.js
          EOF
          sort -o /tmp/expected-files.txt /tmp/expected-files.txt
          git diff --name-only | sort > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt

      - name: Commit validated product candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/fixtures/main-style-source-headroom.json \
            .github/fixtures/settings-ui-contract.json \
            .github/scripts/test_settings_ui_contract.py \
            CHANGELOG.md \
            MissionChief_Map_Command_Toolkit.txt \
            MissionChief_Map_Command_Toolkit.user.js \
            dist/MissionChief_Map_Command_Toolkit.txt \
            dist/MissionChief_Map_Command_Toolkit.user.js \
            dist/SHA256SUMS.txt \
            dist/release-manifest.json \
            help/index.html \
            src/MissionChief_Map_Command_Toolkit.user.js
          git diff --cached --quiet && { echo "No product changes were staged" >&2; exit 1; }
          git commit -m "Extract map visibility toggle routes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
