        <text x="18" y="27" fill="#7ee6ff" font-size="11" font-weight="850" letter-spacing="1.3">MISSION COMMAND</text>
        <text x="18" y="53" fill="#ffffff" font-size="17" font-weight="850">Triage + Matrix</text>
        <text x="18" y="69" fill="#8ca6b8" font-size="10">age · demand · transport</text>
      </g>
      <g transform="translate(218 55)">
        <rect width="174" height="78" rx="16" fill="#102b26" stroke="#58e9ad" stroke-opacity="0.34"/>
        <text x="18" y="27" fill="#79f4bd" font-size="11" font-weight="850" letter-spacing="1.3">FLEET INTELLIGENCE</text>
        <text x="18" y="53" fill="#ffffff" font-size="17" font-weight="850">Codes + Badges</text>
        <text x="18" y="69" fill="#8ea99c" font-size="10">identity · status · gaps</text>
      </g>
      <g transform="translate(408 55)">
        <rect width="174" height="78" rx="16" fill="#2b2311" stroke="#efc75c" stroke-opacity="0.34"/>
        <text x="18" y="27" fill="#ffe08b" font-size="11" font-weight="850" letter-spacing="1.3">FINANCIAL COMMAND</text>
        <text x="18" y="53" fill="#ffffff" font-size="17" font-weight="850">Reconciled Model</text>
        <text x="18" y="69" fill="#b8a779" font-size="10">income · spend · variance</text>
      </g>
