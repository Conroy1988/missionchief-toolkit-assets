name: Retry Toolkit v4.11.0 Greasy Fork Webhook

on:
  pull_request:
    types:
      - opened

permissions:
  contents: write

jobs:
  retry:
    name: Re-emit the v4.11.0 release event
    if: github.event.pull_request.title == '[Webhook Retry] Toolkit v4.11.0 Greasy Fork Sync'
    runs-on: ubuntu-latest
    steps:
      - name: Re-save published release without changing content
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view v4.11.0 --repo "$GITHUB_REPOSITORY" --json body --jq '.body' > release-notes.md
          gh release edit v4.11.0 --repo "$GITHUB_REPOSITORY" \
            --title "MissionChief Map Command Toolkit v4.11.0" \
            --notes-file release-notes.md \
            --latest
          echo "Re-emitted release update event for v4.11.0."
