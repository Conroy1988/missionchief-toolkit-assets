name: Branch Cleanup Audit

run-name: >-
  Branch cleanup ${{
    github.event_name == 'workflow_dispatch' && inputs.delete_fully_merged &&
    'and deletion' || 'audit'
  }}

on:
  schedule:
    - cron: "11 6 * * 1"
  workflow_dispatch:
    inputs:
      delete_fully_merged:
        description: Delete branches proven fully merged into main
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - .github/workflows/branch-cleanup-audit.yml

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.delete_fully_merged)) && 'write' || 'read' }}
      pull-requests: read

    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Inventory and optionally delete fully merged branches
        env:
          GH_TOKEN: ${{ github.token }}
          DELETE_FULLY_MERGED: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.delete_fully_merged) }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          gh pr list --state open --limit 500 --json headRefName > /tmp/open-prs.json
          jq -r '.[].headRefName' /tmp/open-prs.json | sort -u > /tmp/open-heads.txt

          : > /tmp/candidates.txt
          : > /tmp/protected.txt
          : > /tmp/deleted.txt
          : > /tmp/delete-failed.txt

          while IFS= read -r ref; do
            branch="${ref#origin/}"
            [[ "$branch" == "main" || "$branch" == "HEAD" ]] && continue

            if grep -Fxq "$branch" /tmp/open-heads.txt; then
              echo "$branch — open pull request" >> /tmp/protected.txt
              continue
            fi

            if git merge-base --is-ancestor "origin/$branch" origin/main; then
              echo "$branch" >> /tmp/candidates.txt
            else
              echo "$branch — not fully merged" >> /tmp/protected.txt
            fi
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin | sort)

          sort -u -o /tmp/candidates.txt /tmp/candidates.txt
          sort -u -o /tmp/protected.txt /tmp/protected.txt

          if [[ "$DELETE_FULLY_MERGED" == "true" && -s /tmp/candidates.txt ]]; then
            while IFS= read -r branch; do
              [[ -n "$branch" ]] || continue
              if gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}" >/dev/null 2>&1; then
                echo "$branch" >> /tmp/deleted.txt
              else
                echo "$branch — deletion rejected or branch protected" >> /tmp/delete-failed.txt
              fi
            done < /tmp/candidates.txt
          fi

          sort -u -o /tmp/deleted.txt /tmp/deleted.txt
          sort -u -o /tmp/delete-failed.txt /tmp/delete-failed.txt

          jq -n \
            --arg mode "$([[ "$DELETE_FULLY_MERGED" == "true" ]] && echo delete-fully-merged || echo read-only)" \
            --rawfile candidates /tmp/candidates.txt \
            --rawfile deleted /tmp/deleted.txt \
            --rawfile deleteFailed /tmp/delete-failed.txt \
            --rawfile protected /tmp/protected.txt \
            '{
              generatedAt: (now | todateiso8601),
              mode: $mode,
              candidates: ($candidates | split("\n") | map(select(length > 0))),
              deleted: ($deleted | split("\n") | map(select(length > 0))),
              deletionFailures: ($deleteFailed | split("\n") | map(select(length > 0))),
              protectedOrUnmerged: ($protected | split("\n") | map(select(length > 0)))
            }' > branch-cleanup-report.json

          {
            echo '# Branch Cleanup Audit'
            echo
            if [[ "$DELETE_FULLY_MERGED" == "true" ]]; then
              echo '> Guarded deletion mode: only branches fully contained in `main` and not attached to open pull requests were eligible.'
            else
              echo '> Read-only mode: this run deleted nothing.'
            fi
            echo
            echo '## Deleted fully merged branches'
            if [[ -s /tmp/deleted.txt ]]; then
              sed 's/^/- `/' /tmp/deleted.txt | sed 's/$/`/'
            else
              echo '- None'
            fi
            echo
            echo '## Fully merged candidates'
            if [[ -s /tmp/candidates.txt ]]; then
              sed 's/^/- `/' /tmp/candidates.txt | sed 's/$/`/'
            else
              echo '- None'
            fi
            echo
            echo '## Deletion failures'
            if [[ -s /tmp/delete-failed.txt ]]; then
              sed 's/^/- /' /tmp/delete-failed.txt
            else
              echo '- None'
            fi
            echo
            echo '## Preserved branches'
            if [[ -s /tmp/protected.txt ]]; then
              sed 's/^/- /' /tmp/protected.txt
            else
              echo '- None'
            fi
          } > branch-cleanup-report.md

      - name: Publish branch audit summary
        run: cat branch-cleanup-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload branch audit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: branch-cleanup-audit
          path: |
            branch-cleanup-report.json
            branch-cleanup-report.md
          if-no-files-found: error
          retention-days: 30
