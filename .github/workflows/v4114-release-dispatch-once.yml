name: One-time v4.11.4 Release Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/v4114-release-dispatch-once.yml

permissions:
  actions: write
  contents: write

concurrency:
  group: toolkit-v4114-release-dispatch-once
  cancel-in-progress: false

jobs:
  dispatch:
    name: Validate and publish v4.11.4
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm the exact release candidate
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          grep -Eq '^//[[:space:]]*@version[[:space:]]+4\.11\.4[[:space:]]*$' "$SOURCE"
          grep -Fq "version: '4.11.4'" "$SOURCE"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.user.js"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.txt"
          echo "64b5f7d73ab537d3f0fff41832a5e51b17a7884d039f3815fdd1b4b423e1c214  $SOURCE" | sha256sum --check --strict

      - name: Dispatch and await Release Readiness
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run release-readiness-check.yml --ref main -f version=4.11.4
          RUN_ID=""
          for attempt in {1..30}; do
            RUN_ID="$(gh run list --workflow release-readiness-check.yml --event workflow_dispatch --branch main --limit 10 --json databaseId,createdAt -q 'sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::Release Readiness run was not found."; exit 1; }
          echo "Release Readiness run: $RUN_ID"
          gh run watch "$RUN_ID" --exit-status

      - name: Dispatch and await production release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run release-toolkit.yml --ref main -f version=4.11.4 -f confirmation=RELEASE
          RUN_ID=""
          for attempt in {1..30}; do
            RUN_ID="$(gh run list --workflow release-toolkit.yml --event workflow_dispatch --branch main --limit 10 --json databaseId,createdAt -q 'sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::Production release run was not found."; exit 1; }
          echo "Production release run: $RUN_ID"
          gh run watch "$RUN_ID" --exit-status

  cleanup:
    name: Remove one-time dispatcher
    if: always()
    needs: dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Remove this temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          FILE=".github/workflows/v4114-release-dispatch-once.yml"
          [[ -f "$FILE" ]] || exit 0
          git rm "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove completed v4.11.4 release dispatcher"
          git pull --rebase origin main
          git push origin HEAD:main
