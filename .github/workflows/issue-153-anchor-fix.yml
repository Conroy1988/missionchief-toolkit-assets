name: Issue 153 Final Anchor Fix

on:
  push:
    branches:
      - feature/issue-153-version-status

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/issue-153-version-status
      - name: Correct final package indentation anchor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/development-packages/issue-153-version-status.py')
          text = path.read_text(encoding='utf-8')
          old = "release = replace_once(release, '           git add status/release-dashboard.json status/README.md\\n', '           git add status/release-dashboard.json status/README.md status/update-manifest.json\\n', \"release manifest commit\")"
          new = "release = replace_once(release, '          git add status/release-dashboard.json status/README.md\\n', '          git add status/release-dashboard.json status/README.md status/update-manifest.json\\n', \"release manifest commit\")"
          if text.count(old) != 1:
              raise SystemExit(f'Expected one final anchor, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/issue-153-anchor-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/development-packages/issue-153-version-status.py .github/workflows/issue-153-anchor-fix.yml
          git commit -m "Correct Issue 153 release commit anchor"
          git push origin HEAD:feature/issue-153-version-status
