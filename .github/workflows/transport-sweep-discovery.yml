name: Transport Sweep Discovery

on:
  push:
    branches:
      - chore/transport-sweep-discovery

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Reproduce DOM-delta package against current main
        shell: bash
        run: |
          set -u
          git fetch origin main fix/issue-94-dom-delta-lightbox-ownership
          rm -rf /tmp/mcms-package-test
          git worktree add --detach /tmp/mcms-package-test origin/main
          mkdir -p /tmp/mcms-package-test/.github/development-packages
          git show origin/fix/issue-94-dom-delta-lightbox-ownership:.github/development-packages/issue-94-dom-delta-lightbox-ownership.py > /tmp/mcms-package-test/.github/development-packages/issue-94-dom-delta-lightbox-ownership.py
          mkdir -p .github/diagnostics
          (
            cd /tmp/mcms-package-test
            python3 .github/development-packages/issue-94-dom-delta-lightbox-ownership.py
          ) > .github/diagnostics/transport-sweep-window-lifecycle.txt 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> .github/diagnostics/transport-sweep-window-lifecycle.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/diagnostics/transport-sweep-window-lifecycle.txt
          if ! git diff --cached --quiet; then
            git commit -m "Capture v4.14.4 package traceback"
            git push origin HEAD:chore/transport-sweep-discovery
          fi
          exit 0
