name: One-time Hyrule Command v4.13.0 Release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v4130-hyrule-release-once.yml

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: hyrule-command-v4130-release
  cancel-in-progress: false

jobs:
  release:
    name: Validate, merge and publish Hyrule Command
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PR_NUMBER: '56'
      VERSION: '4.13.0'
      EXPECTED_SHA256: '7766664a4981f7985a4903f65a395bf0d00cc03472b5b45d18b5d1abf8712367'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Wait for the exact implementation pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            STATE="$(gh pr view "$PR_NUMBER" --json state -q .state 2>/dev/null || true)"
            HEAD_REF="$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName 2>/dev/null || true)"
            if [[ "$STATE" == "OPEN" && "$HEAD_REF" == "feature/hyrule-command-v4130-release-final" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::Expected open Hyrule implementation PR #${PR_NUMBER} was not available."
          exit 1

      - name: Wait for pull request checks
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if gh pr checks "$PR_NUMBER" --required >/tmp/pr-checks.txt 2>&1; then
              cat /tmp/pr-checks.txt
              exit 0
            fi
            cat /tmp/pr-checks.txt || true
            if grep -qiE 'fail|cancel|error' /tmp/pr-checks.txt; then
              echo "::error::A required pull request check failed."
              exit 1
            fi
            sleep 10
          done
          echo "::error::Pull request checks did not complete in time."
          exit 1

      - name: Validate exact Hyrule candidate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr checkout "$PR_NUMBER" --detach
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          grep -Eq '^//[[:space:]]*@version[[:space:]]+4\.13\.0[[:space:]]*$' "$SOURCE"
          grep -Fq "version: '4.13.0'" "$SOURCE"
          grep -Fq 'Hyrule Command' "$SOURCE"
          test -s themes/hyrule/audio/hyrule-quest-reward.mp3
          test -s themes/hyrule/ui/hyrule-command-crest.svg
          test -s themes/hyrule/payout/quest-complete-seal.svg
          cmp --silent "$SOURCE" dist/MissionChief_Map_Command_Toolkit.user.js
          cmp --silent "$SOURCE" dist/MissionChief_Map_Command_Toolkit.txt
          echo "${EXPECTED_SHA256}  ${SOURCE}" | sha256sum --check --strict
          test ! -e .github/development-packages/hyrule-v4130.py
          python3 .github/scripts/validate_userscript.py
          node --check "$SOURCE"

      - name: Merge validated implementation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)"
          gh pr merge "$PR_NUMBER" --merge --match-head-commit "$HEAD_SHA"

      - name: Validate merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout --detach origin/main
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          grep -Eq '^//[[:space:]]*@version[[:space:]]+4\.13\.0[[:space:]]*$' "$SOURCE"
          grep -Fq "version: '4.13.0'" "$SOURCE"
          echo "${EXPECTED_SHA256}  ${SOURCE}" | sha256sum --check --strict
          cmp --silent "$SOURCE" dist/MissionChief_Map_Command_Toolkit.user.js
          cmp --silent "$SOURCE" dist/MissionChief_Map_Command_Toolkit.txt

      - name: Dispatch and await release readiness
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-readiness-check.yml --ref main -f version="$VERSION"
          RUN_ID=''
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-readiness-check.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo '::error::Release Readiness run was not found.'; exit 1; }
          gh issue comment 52 --body "Hyrule Command v4.13.0 release readiness started as Actions run \`${RUN_ID}\`."
          gh run watch "$RUN_ID" --exit-status

      - name: Dispatch and await production release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-toolkit.yml --ref main -f version="$VERSION" -f confirmation=RELEASE
          RUN_ID=''
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-toolkit.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo '::error::Production release run was not found.'; exit 1; }
          gh issue comment 52 --body "Hyrule Command v4.13.0 production release started as Actions run \`${RUN_ID}\`."
          gh run watch "$RUN_ID" --exit-status

      - name: Record success
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 52 --body 'Hyrule Command v4.13.0 completed the guarded GitHub Release, Greasy Fork verification, private backup and Discord publication pipeline.'
          gh issue close 52 --reason completed

      - name: Record guarded failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 52 --body "Hyrule Command v4.13.0 stopped at a guarded release check. No gate was bypassed. Diagnostics: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  cleanup:
    name: Remove one-time Hyrule release workflow
    if: always()
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          FILE='.github/workflows/v4130-hyrule-release-once.yml'
          [[ -f "$FILE" ]] || exit 0
          git rm "$FILE"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Remove completed Hyrule Command release workflow'
          git pull --rebase origin main
          git push origin HEAD:main
