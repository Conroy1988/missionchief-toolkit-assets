name: Transport Sweep Discovery

on:
  push:
    branches:
      - chore/transport-sweep-discovery

permissions:
  issues: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Capture latest Issue 94 result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/diagnostics
          gh api "/repos/${GITHUB_REPOSITORY}/issues/94/comments?per_page=100" \
            --jq '.[-1] | "author: \(.user.login)\nurl: \(.html_url)\n\n\(.body)"' \
            > .github/diagnostics/issue-94-latest-comment.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/diagnostics/issue-94-latest-comment.txt
          if git diff --cached --quiet; then
            echo "Diagnostic already current."
            exit 0
          fi
          git commit -m "Capture latest Issue 94 automation result [skip ci]"
          git push origin HEAD:chore/transport-sweep-discovery

