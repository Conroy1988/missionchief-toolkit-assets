name: Apply Issue 64 Mission Window Candidate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-issue64-mission-window-export.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Reconstruct reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/development-packages/issue64-mission-window-v4.20.28.part-00 \
            .github/development-packages/issue64-mission-window-v4.20.28.part-01-0 \
            .github/development-packages/issue64-mission-window-v4.20.28.part-01-1 \
            .github/development-packages/issue64-mission-window-v4.20.28.part-01-2 \
            .github/development-packages/issue64-mission-window-v4.20.28.part-02 > /tmp/candidate.b64
          test "$(sha256sum /tmp/candidate.b64 | awk '{print $1}')" = "8cf52211bddcc86b89c17c34b35d4477ee8bf12e133f24ba89ac80662d78931d"
          base64 -d /tmp/candidate.b64 | gzip -d > /tmp/candidate.patch
          test "$(sha256sum /tmp/candidate.patch | awk '{print $1}')" = "42a9b7db3ed962d49dfa108d9fefca3f92a17a5c6fe4862894589619c20a40b5"
          git apply --check /tmp/candidate.patch
          git apply /tmp/candidate.patch
      - name: Prove intended change boundary
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            .github/fixtures/main-style-source-headroom.json
            .github/fixtures/settings-ui-contract.json
            .github/scripts/test_settings_ui_contract.py
            CHANGELOG.md
            MissionChief_Map_Command_Toolkit.txt
            MissionChief_Map_Command_Toolkit.user.js
            dist/MissionChief_Map_Command_Toolkit.txt
            dist/MissionChief_Map_Command_Toolkit.user.js
            dist/SHA256SUMS.txt
            dist/release-manifest.json
            help/index.html
            src/MissionChief_Map_Command_Toolkit.user.js
          )
          test "${changed[*]}" = "${expected[*]}"
      - name: Run candidate validation
        shell: bash
        run: |
          set -euo pipefail
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          python .github/scripts/test_settings_ui_contract.py
          python .github/scripts/check_documentation_drift.py --allow-release-candidate
          bash .github/scripts/run_userscript_preflight.sh
      - name: Commit validated product candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/fixtures/main-style-source-headroom.json \
            .github/fixtures/settings-ui-contract.json \
            .github/scripts/test_settings_ui_contract.py \
            CHANGELOG.md \
            MissionChief_Map_Command_Toolkit.txt \
            MissionChief_Map_Command_Toolkit.user.js \
            dist/MissionChief_Map_Command_Toolkit.txt \
            dist/MissionChief_Map_Command_Toolkit.user.js \
            dist/SHA256SUMS.txt \
            dist/release-manifest.json \
            help/index.html \
            src/MissionChief_Map_Command_Toolkit.user.js
          git commit -m "Extract mission-window toggle routes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
