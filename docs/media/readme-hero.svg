<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 680" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief Map Command Toolkit</title>
  <desc id="desc">A cinematic operational command-centre banner with map intelligence, emergency markers and Hyrule Command accents.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1510" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A12"/>
      <stop offset=".48" stop-color="#0A1727"/>
      <stop offset="1" stop-color="#06100F"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="translate(1210 205) rotate(145) scale(520 390)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#27DBFF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#27DBFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientTransform="translate(1280 545) rotate(-150) scale(430 260)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63FFB0" stop-opacity=".21"/>
      <stop offset="1" stop-color="#63FFB0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF0A0"/>
      <stop offset=".38" stop-color="#E7B84D"/>
      <stop offset="1" stop-color="#7C4815"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8EFFF5"/>
      <stop offset=".48" stop-color="#28BFE8"/>
      <stop offset="1" stop-color="#176B96"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C1D30" stop-opacity=".94"/>
      <stop offset="1" stop-color="#07111D" stop-opacity=".86"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#4ED6FF" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity=".65"/>
    </filter>
    <clipPath id="mapClip"><rect x="920" y="80" width="590" height="520" rx="42"/></clipPath>
  </defs>

  <rect width="1600" height="680" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="680" rx="32" fill="url(#grid)"/>
  <rect width="1600" height="680" rx="32" fill="url(#blueGlow)"/>
  <rect width="1600" height="680" rx="32" fill="url(#greenGlow)"/>

  <g opacity=".24" fill="none" stroke="#5AD7FF" stroke-width="2">
    <path d="M-60 480C100 380 180 520 330 434s250-206 430-92 270 65 438-35 270-92 475 22"/>
    <path d="M-20 540C120 438 245 600 388 498s222-160 390-78 300 104 445-4 244-89 430 4"/>
    <path d="M30 601c150-96 250 44 398-41s254-143 408-51 274 79 411-12 230-70 367 2"/>
  </g>

  <g transform="translate(84 74)">
    <rect width="744" height="532" rx="38" fill="url(#panel)" stroke="#2CBDEB" stroke-opacity=".38" stroke-width="2" filter="url(#shadow)"/>
    <path d="M38 1h232l24 24h410" fill="none" stroke="#70E7FF" stroke-opacity=".45" stroke-width="3"/>
    <path d="M1 406V94L34 61" fill="none" stroke="#70E7FF" stroke-opacity=".22" stroke-width="3"/>

    <g transform="translate(46 44)">
      <circle cx="26" cy="26" r="25" fill="#0A2835" stroke="#43E4F5" stroke-width="2"/>
      <path d="M26 9 35 25H17L26 9Zm-9 19h18l-9 16-9-16Z" fill="url(#cyan)" filter="url(#softGlow)"/>
      <text x="70" y="22" fill="#74E7FF" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="4">MISSIONCHIEF</text>
      <text x="70" y="49" fill="#AFC7D8" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="2">MAP COMMAND TOOLKIT</text>
    </g>

    <text x="46" y="170" fill="#F4FBFF" font-family="Segoe UI,Arial,sans-serif" font-size="65" font-weight="800" letter-spacing="-2">Command the map.</text>
    <text x="46" y="236" fill="url(#cyan)" font-family="Segoe UI,Arial,sans-serif" font-size="65" font-weight="800" letter-spacing="-2">See the whole incident.</text>
    <text x="49" y="291" fill="#A9C1D4" font-family="Segoe UI,Arial,sans-serif" font-size="22">Operational intelligence, fleet awareness, responsive controls</text>
    <text x="49" y="324" fill="#A9C1D4" font-family="Segoe UI,Arial,sans-serif" font-size="22">and cinematic mission presentation — in one userscript.</text>

    <g transform="translate(48 370)">
      <g><rect width="147" height="50" rx="14" fill="#0E2B3E" stroke="#30CFF5" stroke-opacity=".62"/><circle cx="25" cy="25" r="7" fill="#50E4FF"/><text x="43" y="31" fill="#DDF8FF" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">MISSION INTEL</text></g>
      <g transform="translate(162)"><rect width="144" height="50" rx="14" fill="#102A23" stroke="#5AF2AE" stroke-opacity=".58"/><circle cx="25" cy="25" r="7" fill="#65FFB2"/><text x="43" y="31" fill="#E5FFF2" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">FLEET STATUS</text></g>
      <g transform="translate(321)"><rect width="126" height="50" rx="14" fill="#2A2112" stroke="#E9B94E" stroke-opacity=".64"/><circle cx="25" cy="25" r="7" fill="#FFD56E"/><text x="43" y="31" fill="#FFF4D7" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">THEMES</text></g>
      <g transform="translate(462)"><rect width="168" height="50" rx="14" fill="#21152C" stroke="#C486FF" stroke-opacity=".62"/><circle cx="25" cy="25" r="7" fill="#CE8BFF"/><text x="43" y="31" fill="#F5E8FF" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">VERIFIED RELEASES</text></g>
    </g>

    <text x="49" y="487" fill="#6C879B" font-family="Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.4">DESKTOP · TABLET · iOS · GREASY FORK</text>
  </g>

  <g clip-path="url(#mapClip)" filter="url(#shadow)">
    <rect x="920" y="80" width="590" height="520" rx="42" fill="#08131F" stroke="#35CFF5" stroke-opacity=".35" stroke-width="2"/>
    <path d="M950 232c81-63 144-38 211-85 70-49 123-10 184-42 49-26 108-13 177 27v482H902V356c44-25 74-63 48-124Z" fill="#0E2330"/>
    <g opacity=".34" fill="none" stroke="#3CBAD5" stroke-width="2">
      <path d="M889 168c126-61 179 19 281-35 109-58 207-45 377 23"/>
      <path d="M883 218c119-45 189 26 290-22 105-50 208-44 382 31"/>
      <path d="M879 279c133-34 177 30 293-9 112-38 220-22 387 52"/>
      <path d="M886 349c104-30 188 31 288 1 117-35 219-11 377 45"/>
      <path d="M900 425c114-30 194 25 296 3 111-25 214-1 347 45"/>
      <path d="M925 501c106-18 178 19 275 8 108-13 199 8 317 48"/>
    </g>
    <g opacity=".45" fill="none" stroke="#52F5B3" stroke-width="3" stroke-dasharray="9 9">
      <path d="M978 518c87-111 151-85 211-183 53-86 119-95 231-166"/>
    </g>

    <g transform="translate(1115 130)" filter="url(#softGlow)">
      <path d="M90 0 137 82H43L90 0Z" fill="url(#gold)" stroke="#FFF2A3" stroke-width="5"/>
      <path d="M43 91 90 173H-4L43 91Z" fill="url(#gold)" stroke="#FFF2A3" stroke-width="5"/>
      <path d="M137 91 184 173H90l47-82Z" fill="url(#gold)" stroke="#FFF2A3" stroke-width="5"/>
    </g>

    <g transform="translate(1034 370)">
      <circle r="36" fill="#0B2634" stroke="#51E9FF" stroke-width="3"/>
      <circle r="12" fill="#D9FFFF" stroke="#35DCF3" stroke-width="6" filter="url(#softGlow)"/>
      <path d="M0-55v18M0 37v18M-55 0h18M37 0h18" stroke="#52E8F8" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g transform="translate(1367 422)">
      <circle r="43" fill="#241016" stroke="#FF5571" stroke-width="3"/>
      <path d="M0-20 18 18H-18L0-20Z" fill="#FF7087" filter="url(#softGlow)"/>
      <rect x="-3" y="25" width="6" height="11" rx="3" fill="#FFD7DE"/>
    </g>
    <g transform="translate(1215 515)">
      <circle r="32" fill="#10291F" stroke="#62F4AA" stroke-width="3"/>
      <path d="m-12 2 8 8 18-23" fill="none" stroke="#B4FFD5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(968 103)">
      <rect width="158" height="56" rx="15" fill="#0B1A28" fill-opacity=".93" stroke="#2DC6E9" stroke-opacity=".55"/>
      <text x="18" y="23" fill="#6FE8FF" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.7">LIVE INCIDENTS</text>
      <text x="18" y="45" fill="#F2FBFF" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">24 ACTIVE</text>
    </g>
    <g transform="translate(1305 519)">
      <rect width="169" height="55" rx="15" fill="#101F19" fill-opacity=".94" stroke="#62E8A7" stroke-opacity=".55"/>
      <text x="17" y="22" fill="#7EF4B8" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">RELEASE HEALTH</text>
      <text x="17" y="43" fill="#ECFFF5" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">VERIFIED</text>
    </g>
  </g>

  <rect x="1" y="1" width="1598" height="678" rx="31" fill="none" stroke="#82E9FF" stroke-opacity=".16" stroke-width="2"/>
</svg>
