name: Temporary iOS Candidate Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-ios-source-export.yml"
      - ".github/development-packages/ios-safari-usability.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Apply candidate package
        run: python3 .github/development-packages/ios-safari-usability.py
      - name: Run expanded validator
        id: validation
        shell: bash
        run: |
          set +e
          python3 .github/scripts/validate_userscript.py > ios-validation.log 2>&1
          status=$?
          cat ios-validation.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload complete validation log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-validation-log
          path: ios-validation.log
          if-no-files-found: error
          retention-days: 1
      - name: Stop on validation failure
        if: steps.validation.outputs.status != '0'
        run: exit 1
