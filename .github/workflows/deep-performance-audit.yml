name: Deep Performance Audit

on:
  pull_request:
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - ".github/scripts/deep_performance_audit.py"
      - ".github/scripts/test_deep_performance_audit.py"
      - ".github/workflows/deep-performance-audit.yml"
      - "docs/audits/deep-performance-audit-v4.20.17.md"
  push:
    branches:
      - main
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - ".github/scripts/deep_performance_audit.py"
      - ".github/scripts/test_deep_performance_audit.py"
      - ".github/workflows/deep-performance-audit.yml"
      - "docs/audits/deep-performance-audit-v4.20.17.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolkit-deep-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Inventory runtime hotspots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify measurement-only audit branch
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'audit/')
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if ! git diff --quiet "$BASE_SHA...HEAD" -- src dist; then
            echo "::error::Measurement-only audit branches must not modify src/ or dist/."
            git diff --stat "$BASE_SHA...HEAD" -- src dist
            exit 1
          fi

      - name: Run deep-audit fixtures
        run: |
          python3 -m py_compile .github/scripts/deep_performance_audit.py
          python3 .github/scripts/test_deep_performance_audit.py

      - name: Generate deep performance inventory
        run: |
          python3 .github/scripts/deep_performance_audit.py \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --json-output deep-performance-audit.json \
            --markdown-output deep-performance-audit.md

      - name: Publish audit summary
        run: cat deep-performance-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-deep-performance-audit
          path: |
            deep-performance-audit.json
            deep-performance-audit.md
          if-no-files-found: error
          retention-days: 30
