name: Agent inspect monospaced notes integration

on:
  push:
    branches:
      - agent/monospaced-mission-notes
    paths-ignore:
      - agent-inspection.txt

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/monospaced-mission-notes
      - name: Persist userscript integration anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('src/MissionChief_Map_Command_Toolkit.user.js')
          output_path = Path('agent-inspection.txt')
          lines = source_path.read_text(encoding='utf-8').splitlines()
          patterns = [
              "allianceBuildingsMap",
              "allianceBuildingsMapBlocker",
              "missionRequirements",
              "toggleRoutes",
              "toggleStatePaths",
              "data-toggle",
              "data-setting",
              "function renderPanel",
              "function render",
              "saveState",
              "loadState",
              "DEFAULT_STATE",
              "defaultState",
              "const defaults",
              "settings-grid",
              "Settings",
          ]

          report = []
          seen = set()
          for pattern in patterns:
              matches = [i for i, line in enumerate(lines) if pattern in line]
              report.append(f"\n===== PATTERN: {pattern!r} ({len(matches)} matches) =====")
              for i in matches[:40]:
                  start = max(0, i - 18)
                  end = min(len(lines), i + 19)
                  key = (start, end)
                  if key in seen:
                      continue
                  seen.add(key)
                  report.append(f"--- lines {start + 1}-{end} ---")
                  report.extend(f"{n + 1:06d}: {lines[n]}" for n in range(start, end))

          output_path.write_text("\n".join(report) + "\n", encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add agent-inspection.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record monospaced notes integration anchors [skip ci]"
            git push origin HEAD:agent/monospaced-mission-notes
          fi
