<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief Map Command Toolkit v4.20.33</title>
  <desc id="desc">A dark operational command dashboard presenting the verified MissionChief Map Command Toolkit release, mission intelligence, fleet awareness, financial command, seven interface systems and desktop, tablet and iOS support.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030812"/>
      <stop offset="0.52" stop-color="#081a2b"/>
      <stop offset="1" stop-color="#160b17"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#43dcff"/>
      <stop offset="0.48" stop-color="#7de8ff"/>
      <stop offset="0.52" stop-color="#ff7b87"/>
      <stop offset="1" stop-color="#d63345"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.105"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <linearGradient id="cyanPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143e55" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#07131f" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a1720" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#100b13" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="blueGlow">
      <stop offset="0" stop-color="#36c7ff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#36c7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow">
      <stop offset="0" stop-color="#ef4152" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ef4152" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#b9eaff" stroke-opacity="0.045"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/></filter>
  </defs>

  <rect width="1600" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="32" fill="url(#grid)"/>
  <circle cx="150" cy="80" r="250" fill="url(#blueGlow)" filter="url(#blur)"/>
  <circle cx="1470" cy="570" r="330" fill="url(#redGlow)" filter="url(#blur)"/>
  <rect x="1.5" y="1.5" width="1597" height="637" rx="30.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <g font-family="Segoe UI,Arial,sans-serif">
    <g transform="translate(70 54)">
      <rect width="338" height="38" rx="19" fill="#0c273d" stroke="#43caff" stroke-opacity="0.55"/>
      <circle cx="20" cy="19" r="6" fill="#52d5ff"/>
      <circle cx="20" cy="19" r="12" fill="none" stroke="#52d5ff" stroke-opacity="0.25"/>
      <text x="42" y="25" fill="#c4edff" font-size="14" font-weight="800" letter-spacing="2">MISSIONCHIEF · OPERATIONS COMMAND</text>
    </g>

    <text x="70" y="176" fill="#ffffff" font-size="66" font-weight="900" letter-spacing="1.4">MAP COMMAND TOOLKIT</text>
    <text x="74" y="226" fill="#85d9ff" font-size="25" font-weight="750" letter-spacing="5.5">ONE MAP · EVERY OPERATIONAL LAYER</text>
    <text x="74" y="276" fill="#d9e8f2" font-size="20">Mission intelligence · Fleet identity · Geographic command · Financial control</text>

    <g transform="translate(74 307)" font-size="13" font-weight="800" letter-spacing="1">
      <rect width="171" height="42" rx="9" fill="#0d2b42" stroke="#45cbff" stroke-opacity="0.52"/>
      <text x="26" y="27" fill="#d9f5ff">VERIFIED v4.20.33</text>
      <rect x="187" width="154" height="42" rx="9" fill="#12233a" stroke="#8bdfff" stroke-opacity="0.40"/>
