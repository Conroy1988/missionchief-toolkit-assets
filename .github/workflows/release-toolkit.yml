name: Release Toolkit

on:
  workflow_call:
    inputs:
      version:
        description: "Validated Toolkit version to publish"
        required: true
        type: string
      confirmation:
        description: "Type RELEASE to confirm a public release"
        required: true
        type: string
    secrets:
      DISCORD_RELEASE_WEBHOOK:
        required: true
      MIGRATION_REPO_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Validated Toolkit version to publish"
        required: true
        type: string
      confirmation:
        description: "Type RELEASE to confirm a public release"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: toolkit-production-release
  cancel-in-progress: false

jobs:
  release:
    name: Validate, publish, back up and verify Toolkit release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Production release safety gate
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          CONFIRMATION: ${{ inputs.confirmation }}
          GH_TOKEN: ${{ github.token }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$CONFIRMATION" == "RELEASE" ]] || { echo "::error::Type RELEASE exactly to confirm."; exit 1; }
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || { echo "::error::Invalid release version: $RELEASE_VERSION"; exit 1; }
          [[ "$(jq -r '.greasyFork.syncEnabled' .github/release-settings.json)" == "true" ]] || { echo "::error::Greasy Fork release synchronization is not enabled."; exit 1; }
          [[ -n "${MIGRATION_REPO_TOKEN:-}" ]] || { echo "::error::MIGRATION_REPO_TOKEN is not configured."; exit 1; }
          gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1 && { echo "::error::GitHub Release v${RELEASE_VERSION} already exists."; exit 1; } || true

      - name: Validate canonical source and rebuild distribution
        run: python3 .github/scripts/validate_userscript.py

      - name: Check JavaScript syntax
        run: node --check src/MissionChief_Map_Command_Toolkit.user.js

      - name: Verify distribution files are identical
        run: cmp --silent dist/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt

      - name: Commit stable Greasy Fork source mirror
        id: greasyfork_mirror
        shell: bash
        run: bash .github/scripts/sync_greasyfork_root_mirror.sh

      - name: Prepare immutable release bundle
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/prepare_release_bundle.py "$RELEASE_VERSION"

      - name: Prepare stable Greasy Fork release assets
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cp "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.user.js" \
             "release-bundle/MissionChief_Map_Command_Toolkit.user.js"
          cp "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.txt" \
             "release-bundle/MissionChief_Map_Command_Toolkit.txt"
          cmp --silent \
             "release-bundle/MissionChief_Map_Command_Toolkit.user.js" \
             "release-bundle/MissionChief_Map_Command_Toolkit.txt"

      - name: Verify release bundle integrity
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          USER_FILE="release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.user.js"
          TXT_FILE="release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.txt"
          MANIFEST="release-bundle/release-manifest-v${RELEASE_VERSION}.json"
          cmp --silent "$USER_FILE" "$TXT_FILE"
          EXPECTED_HASH="$(jq -r '.sha256' "$MANIFEST")"
          test "$(sha256sum "$USER_FILE" | awk '{print $1}')" = "$EXPECTED_HASH"
          test "$(jq -r '.version' "$MANIFEST")" = "$RELEASE_VERSION"

      - name: Upload immutable workflow backup
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-v${{ inputs.version }}-validated-release
          path: release-bundle/
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_TARGET_SHA: ${{ steps.greasyfork_mirror.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$RELEASE_TARGET_SHA" ]] || { echo "::error::Greasy Fork source mirror target SHA was not recorded."; exit 1; }
          gh release create "v${RELEASE_VERSION}" \
            --target "$RELEASE_TARGET_SHA" \
            --title "MissionChief Map Command Toolkit v${RELEASE_VERSION}" \
            --notes-file "release-bundle/CHANGELOG-v${RELEASE_VERSION}.md" \
            "release-bundle/MissionChief_Map_Command_Toolkit.user.js" \
            "release-bundle/MissionChief_Map_Command_Toolkit.txt" \
            "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.user.js" \
            "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.txt" \
            "release-bundle/CHANGELOG-v${RELEASE_VERSION}.md" \
            "release-bundle/release-manifest-v${RELEASE_VERSION}.json" \
            "release-bundle/SHA256SUMS-v${RELEASE_VERSION}.txt" \
            "release-bundle/migration-handover-v${RELEASE_VERSION}.md"

      - name: Wait for Greasy Fork synchronization
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          META_URL="$(jq -r '.greasyFork.metadataUrl' .github/release-settings.json)"
          SYNCED=false
          for attempt in $(seq 1 30); do
            echo "Greasy Fork verification attempt $attempt of 30..."
            if curl --fail --silent --show-error --location --compressed --max-time 30 \
              --header "Cache-Control: no-cache" \
              "${META_URL}?cache_bust=$(date +%s%N)" --output greasyfork-release.meta.js; then
              LIVE_VERSION="$(sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' greasyfork-release.meta.js | head -n 1 | xargs)"
              echo "Expected version: $RELEASE_VERSION"
              echo "Greasy Fork version: ${LIVE_VERSION:-unavailable}"
              [[ "$LIVE_VERSION" == "$RELEASE_VERSION" ]] && { SYNCED=true; break; }
            fi
            sleep 60
          done
          [[ "$SYNCED" == "true" ]] || { echo "::error::Greasy Fork did not publish version $RELEASE_VERSION within 30 minutes. Discord was not notified."; exit 1; }

      - name: Back up validated release to private migration repository
        id: private_backup
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
        shell: bash
        run: bash .github/scripts/backup_release_to_private_repo.sh

      - name: Post verified release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ inputs.version }}
          BACKUP_COMMIT: ${{ steps.private_backup.outputs.backup_commit }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${DISCORD_WEBHOOK_URL:-}" ]] || { echo "::error::DISCORD_RELEASE_WEBHOOK is not configured."; exit 1; }
          [[ -n "${BACKUP_COMMIT:-}" ]] || { echo "::error::Private backup commit was not recorded."; exit 1; }
          SCRIPT_URL="$(jq -r '.greasyFork.scriptUrl' .github/release-settings.json)"
          INSTALL_URL="$(jq -r '.greasyFork.installUrl' .github/release-settings.json)"
          HASH="$(jq -r '.sha256' "release-bundle/release-manifest-v${RELEASE_VERSION}.json")"

          python3 .github/scripts/build_discord_release_payload.py \
            --mode primary \
            --version "$RELEASE_VERSION" \
            --changelog "release-bundle/CHANGELOG-v${RELEASE_VERSION}.md" \
            --output discord-release-payload.json \
            --release-url "$RELEASE_URL" \
            --script-url "$SCRIPT_URL" \
            --install-url "$INSTALL_URL" \
            --sha256 "$HASH" \
            --backup-commit "$BACKUP_COMMIT"

          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            --request POST --header "Content-Type: application/json" \
            --data @discord-release-payload.json "${DISCORD_WEBHOOK_URL}?wait=true"

      - name: Record successful release in dashboard
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          BACKUP_COMMIT: ${{ steps.private_backup.outputs.backup_commit }}
        shell: bash
        run: |
          set -euo pipefail
          NOW="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          HASH="$(jq -r '.sha256' "release-bundle/release-manifest-v${RELEASE_VERSION}.json")"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/v${RELEASE_VERSION}"
          jq --arg version "$RELEASE_VERSION" --arg hash "$HASH" --arg now "$NOW" \
             --arg releaseUrl "$RELEASE_URL" --arg backupCommit "$BACKUP_COMMIT" \
            '.currentVersion=$version |
             .status.validation="passed" |
             .status.githubRelease="published" |
             .status.greasyForkSync="verified" |
             .status.backup="private-repository-verified" |
             .status.discordRelease="posted" |
             .status.releaseReadiness="passed" |
             .releaseReadiness={version:$version,state:"passed",requiredSecrets:true,privateRepositoryReadWrite:true,greasyForkMetadataVerified:true,publicReleaseCreated:false,completedAt:$now} |
             .latestRelease={version:$version,sha256:$hash,githubRelease:$releaseUrl,greasyForkVerified:true,privateBackupCommit:$backupCommit,discordPosted:true,completedAt:$now} |
             .lastUpdated=$now' \
            status/release-dashboard.json > status/release-dashboard.tmp
          mv status/release-dashboard.tmp status/release-dashboard.json
          python3 .github/scripts/generate_release_dashboard.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/release-dashboard.json status/README.md
          git commit -m "Record Toolkit ${RELEASE_VERSION} verified release"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish verified update manifest
        id: update_manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run publish-update-manifest.yml --ref main

          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID="$(gh run list --workflow publish-update-manifest.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The dispatched update-manifest run was not found."; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Waiting for update-manifest run ${RUN_ID} for Toolkit ${RELEASE_VERSION}."
          gh run watch "$RUN_ID" --exit-status

      - name: Deploy verified documentation site
        id: pages_deploy
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run github-pages.yml --ref main

          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID="$(gh run list --workflow github-pages.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The dispatched GitHub Pages deployment run was not found."; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Waiting for GitHub Pages deployment run ${RUN_ID} for Toolkit ${RELEASE_VERSION}."
          gh run watch "$RUN_ID" --exit-status

      - name: Write release summary
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          BACKUP_COMMIT: ${{ steps.private_backup.outputs.backup_commit }}
          MANIFEST_RUN_ID: ${{ steps.update_manifest.outputs.run_id }}
          PAGES_RUN_ID: ${{ steps.pages_deploy.outputs.run_id }}
        shell: bash
        run: |
          {
            echo "# Toolkit v${RELEASE_VERSION} release"
            echo
            echo "- ✅ Canonical source validated"
            echo "- ✅ JavaScript syntax checked"
            echo "- ✅ Stable root-level Greasy Fork source mirror committed"
            echo "- ✅ Immutable release bundle prepared"
            echo "- ✅ Stable Greasy Fork release asset published"
            echo "- ✅ GitHub Release published"
            echo "- ✅ Greasy Fork version verified"
            echo "- ✅ Private migration backup committed: ${BACKUP_COMMIT}"
            echo "- ✅ Discord release announcement posted"
            echo "- ✅ Release dashboard and generated control panel updated"
            echo "- ✅ Stable update manifest published: ${MANIFEST_RUN_ID}"
            echo "- ✅ GitHub Pages deployment completed: ${PAGES_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
