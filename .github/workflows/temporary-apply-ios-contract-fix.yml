name: Temporary Apply iOS Contract Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-apply-ios-contract-fix.yml"

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out exact iOS branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/ios-safari-usability
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.DEVELOPMENT_PR_TOKEN }}

      - name: Apply reviewed contract fix
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/development-packages/ios-safari-contract-fix.py
          rm -f .github/development-packages/ios-safari-contract-fix.py
          rm -f .github/workflows/temporary-apply-ios-contract-fix.yml
          rm -rf .github/scripts/__pycache__

      - name: Run complete deterministic preflight
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: bash .github/scripts/run_userscript_preflight.sh

      - name: Validate Actions security
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 .github/scripts/audit_actions_security.py

      - name: Commit and push clean candidate
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/scripts/__pycache__
          rm -f actions-security-report.json actions-security-report.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "::error::No corrected candidate changes were staged."; exit 1; }
          git commit -m "Complete iOS Safari contract isolation"
          git push origin HEAD:feature/ios-safari-usability
