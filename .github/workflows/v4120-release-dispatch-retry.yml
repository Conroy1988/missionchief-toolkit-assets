name: One-time v4.12.0 Release Dispatcher Retry

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/v4120-release-dispatch-retry.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: toolkit-v4120-release-dispatch-retry
  cancel-in-progress: false

jobs:
  dispatch:
    name: Correlate, validate and publish v4.12.0
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm the exact release candidate
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          grep -Eq '^//[[:space:]]*@version[[:space:]]+4\.12\.0[[:space:]]*$' "$SOURCE"
          grep -Fq "version: '4.12.0'" "$SOURCE"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.user.js"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.txt"
          echo "5f2e209bcd890b8a2bee617a6eda84d690b52c589397be7490ce992f55c21336  $SOURCE" | sha256sum --check --strict

      - name: Record dispatch start
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 50 --body "Automated v4.12.0 release retry started from dispatcher run ${GITHUB_RUN_ID}. The candidate hash is \`5f2e209bcd890b8a2bee617a6eda84d690b52c589397be7490ce992f55c21336\`."

      - name: Dispatch and await correlated Release Readiness run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-readiness-check.yml --ref main -f version=4.12.0
          RUN_ID=""
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-readiness-check.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The newly dispatched Release Readiness run was not found."; exit 1; }
          gh issue comment 50 --body "Release Readiness v4.12.0 started as Actions run \`${RUN_ID}\`."
          gh run watch "$RUN_ID" --exit-status

      - name: Dispatch and await correlated production release run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-toolkit.yml --ref main -f version=4.12.0 -f confirmation=RELEASE
          RUN_ID=""
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-toolkit.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The newly dispatched production release run was not found."; exit 1; }
          gh issue comment 50 --body "Production release v4.12.0 started as Actions run \`${RUN_ID}\`. GitHub Release, Greasy Fork verification, private backup and Discord announcement remain guarded inside that workflow."
          gh run watch "$RUN_ID" --exit-status

      - name: Record successful completion
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 50 --body "Automated v4.12.0 production release completed successfully. The release workflow passed its GitHub Release, Greasy Fork verification, private backup and Discord gates."

      - name: Record dispatcher failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 50 --body "Automated v4.12.0 release retry stopped at a guarded pipeline check. Dispatcher diagnostics: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. No failed gate was bypassed."

  cleanup:
    name: Remove one-time retry dispatcher
    if: always()
    needs: dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Remove this temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          FILE=".github/workflows/v4120-release-dispatch-retry.yml"
          [[ -f "$FILE" ]] || exit 0
          git rm "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove completed v4.12.0 release retry dispatcher"
          git pull --rebase origin main
          git push origin HEAD:main
