name: Temporary Toolkit 4.20.23 Release

on:
  push:
    branches:
      - agent/release-4.20.23
    paths:
      - ".github/workflows/temporary-release-4.20.23.yml"

permissions:
  contents: write
  actions: write

jobs:
  release:
    uses: ./.github/workflows/release-toolkit.yml
    with:
      version: "4.20.23"
      confirmation: "RELEASE"
    secrets: inherit
