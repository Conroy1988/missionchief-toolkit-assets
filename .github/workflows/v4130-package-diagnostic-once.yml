name: One-time Hyrule Package Diagnostic

on:
  push:
    branches: [main]
    paths: [.github/workflows/v4130-package-diagnostic-once.yml]

permissions:
  contents: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Inspect package
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          git show 93dfbb01fd126293eafd5f4373d6bc3713eddb4f:.github/development-packages/hyrule-command-v4130.py > /tmp/pkg.py 2>/tmp/show.err
          SHOW=$?
          python3 -m py_compile /tmp/pkg.py 2>/tmp/compile.err
          COMPILE=$?
          LINES=$(wc -l < /tmp/pkg.py 2>/dev/null || echo 0)
          BYTES=$(wc -c < /tmp/pkg.py 2>/dev/null || echo 0)
          TAIL=$(tail -n 8 /tmp/pkg.py 2>/dev/null || true)
          SHOWERR=$(tail -n 8 /tmp/show.err 2>/dev/null || true)
          COMPERR=$(tail -n 12 /tmp/compile.err 2>/dev/null || true)
          printf -v BODY 'Hyrule package diagnostic: show=%s compile=%s lines=%s bytes=%s\n\nGit error:\n```text\n%s\n```\nCompile error:\n```text\n%s\n```\nFile tail:\n```text\n%s\n```' "$SHOW" "$COMPILE" "$LINES" "$BYTES" "$SHOWERR" "$COMPERR" "$TAIL"
          gh issue comment 52 --body "$BODY"
      - name: Remove diagnostic
        shell: bash
        run: |
          git rm .github/workflows/v4130-package-diagnostic-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove Hyrule package diagnostic"
          git pull --rebase origin main
          git push origin main
