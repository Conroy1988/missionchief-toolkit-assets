name: Full Userscript Audit

run-name: Full userscript audit · ${{ github.event_name }}

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/MissionChief_Map_Command_Toolkit.user.js"
      - "dist/MissionChief_Map_Command_Toolkit.user.js"
      - ".github/eslint-userscript.config.mjs"
      - ".github/fixtures/financial-ledger-contract.json"
      - ".github/fixtures/financial-overview-contract.json"
      - ".github/fixtures/financial-discord-image-layout-contract.json"
      - ".github/fixtures/mission-marker-ingestion-contract.json"
      - ".github/fixtures/boot-lifecycle-contract.json"
      - ".github/fixtures/settings-ui-contract.json"
      - ".github/fixtures/desktop-panel-layout-contract.json"
      - ".github/fixtures/transport-sweep-lssm-contract.json"
      - ".github/scripts/full_userscript_audit.py"
      - ".github/scripts/refine_full_userscript_audit.py"
      - ".github/scripts/summarise_eslint_audit.py"
      - ".github/scripts/extract_userscript_audit_evidence.py"
      - ".github/scripts/run_userscript_preflight.sh"
      - ".github/scripts/test_financial_ledger_contract.py"
      - ".github/scripts/test_financial_overview_contract.py"
      - ".github/scripts/test_financial_discord_image_layout_contract.py"
      - ".github/scripts/test_mission_marker_ingestion_contract.py"
      - ".github/scripts/test_issue391_matrix_retirement.py"
      - ".github/scripts/test_boot_lifecycle_contract.py"
      - ".github/scripts/test_settings_ui_contract.py"
      - ".github/scripts/test_desktop_panel_layout_contract.py"
      - ".github/scripts/test_mission_value_contract.py"
      - ".github/scripts/test_transport_sweep_lssm_contract.py"
      - ".github/scripts/test_transport_sweep_runtime.js"
      - ".github/workflows/full-userscript-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolkit-full-userscript-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contract and syntax lane
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run deterministic contract preflight
        run: bash .github/scripts/run_userscript_preflight.sh --contracts

  static-audit:
    name: Static-analysis lane
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run full static audit
        id: full_audit
        shell: bash
        run: |
          set +e
          python3 .github/scripts/full_userscript_audit.py \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --dist dist/MissionChief_Map_Command_Toolkit.user.js \
            --json-output full-userscript-audit-raw.json \
            --markdown-output full-userscript-audit-raw.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Refine audit and attach exact source evidence
        id: refined_audit
        shell: bash
        run: |
          set +e
          python3 .github/scripts/refine_full_userscript_audit.py \
            --raw full-userscript-audit-raw.json \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --json-output full-userscript-audit.json \
            --markdown-output full-userscript-audit.md
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish static audit summary
        if: always()
        run: cat full-userscript-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload static audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-static-audit
          path: |
            full-userscript-audit-raw.json
            full-userscript-audit-raw.md
            full-userscript-audit.json
            full-userscript-audit.md
          if-no-files-found: error
          retention-days: 90

      - name: Stop on definite static-audit failure
        if: >-
          steps.full_audit.outputs.exit_code != '0' ||
          steps.refined_audit.outputs.exit_code != '0'
        run: |
          echo "One or more definite static-audit gates failed. Review the workflow summary and evidence artifact."
          exit 1

  eslint-audit:
    name: ESLint lane
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Restore ESLint package cache
        id: eslint-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: toolkit-eslint-${{ runner.os }}-9.32.0

      - name: Install exact ESLint audit engine
        run: npm install --no-save --ignore-scripts --no-audit --no-fund eslint@9.32.0

      - name: Save ESLint package cache
        if: steps.eslint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: toolkit-eslint-${{ runner.os }}-9.32.0

      - name: Run AST-backed ESLint audit
        id: eslint
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/eslint \
            --config .github/eslint-userscript.config.mjs \
            --no-ignore \
            --format json \
            src/MissionChief_Map_Command_Toolkit.user.js \
            > eslint-userscript-raw.json
          ESLINT_STATUS=$?
          python3 .github/scripts/summarise_eslint_audit.py \
            --input eslint-userscript-raw.json \
            --json-output eslint-userscript-audit.json \
            --markdown-output eslint-userscript-audit.md
          SUMMARY_STATUS=$?
          echo "eslint_exit_code=$ESLINT_STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_exit_code=$SUMMARY_STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Extract exact source evidence
        run: |
          python3 .github/scripts/extract_userscript_audit_evidence.py \
            --source src/MissionChief_Map_Command_Toolkit.user.js \
            --eslint eslint-userscript-audit.json \
            --output userscript-audit-evidence.md

      - name: Publish ESLint audit summary
        if: always()
        run: cat eslint-userscript-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ESLint audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-eslint-audit
          path: |
            eslint-userscript-raw.json
            eslint-userscript-audit.json
            eslint-userscript-audit.md
            userscript-audit-evidence.md
          if-no-files-found: error
          retention-days: 90

      - name: Stop on definite ESLint failure
        if: steps.eslint.outputs.summary_exit_code != '0'
        run: |
          echo "The definite ESLint summary gate failed. Review the workflow summary and evidence artifact."
          exit 1

  audit:
    name: Audit complete canonical userscript
    if: always()
    needs:
      - contracts
      - static-audit
      - eslint-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Aggregate parallel audit lanes
        env:
          CONTRACT_RESULT: ${{ needs.contracts.result }}
          STATIC_RESULT: ${{ needs.static-audit.result }}
          ESLINT_RESULT: ${{ needs.eslint-audit.result }}
        run: |
          set -euo pipefail
          printf 'Contract lane: %s\nStatic lane: %s\nESLint lane: %s\n' \
            "$CONTRACT_RESULT" "$STATIC_RESULT" "$ESLINT_RESULT"
          [[ "$CONTRACT_RESULT" == "success" ]]
          [[ "$STATIC_RESULT" == "success" ]]
          [[ "$ESLINT_RESULT" == "success" ]]
