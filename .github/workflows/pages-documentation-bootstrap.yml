name: Pages Documentation Bootstrap

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - ".github/workflows/pages-documentation-bootstrap.yml"
      - ".github/pages-bootstrap/**"

permissions:
  contents: write

jobs:
  install:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Verify package part 01
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part01)"
          test "${#content}" = 3800
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 086877e36f4d12b1b3adc1843fac3abfe055a55b5d80ca1813ba7c0815b02a9d

      - name: Verify package part 02
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part02)"
          test "${#content}" = 3800
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 4007c3301c995a0818cc8b4b386b76631dbb6ade1c02b2634dd6dd6794bf6d25

      - name: Verify package part 03
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part03)"
          test "${#content}" = 7600
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 497b38e64711e17092cb5796dbcef6e01bbb9774ac7e7a037e952054a37e05be

      - name: Verify package part 04a
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part04a)"
          test "${#content}" = 3800
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 0ed5c1e30f290d5ae37fa8297fa57ec71e417dacc843f067d56fe29814131e35

      - name: Verify package part 04b1
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part04b1)"
          test "${#content}" = 1900
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 72978066826098bf0acd94a77a1fa98d8ca248a4b645d6ae8b7b3a8a86fad4ac

      - name: Verify package part 04b2
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part04b2)"
          test "${#content}" = 1900
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = 3dc84dd556e605fab3f88efe266942380555cee198afa6ec126c3c262585c7b4

      - name: Verify package part 05
        shell: bash
        run: |
          set -euo pipefail
          content="$(tr -d '\n' < .github/pages-bootstrap/package.part05)"
          test "${#content}" = 5556
          test "$(printf '%s' "$content" | sha256sum | awk '{print $1}')" = fa34a0a25828577b5a972034442e81f8ad58e1fb1139ea06e80c4e1c5b0e5979

      - name: Reconstruct and verify Pages archive
        shell: bash
        run: |
          set -euo pipefail
          cat .github/pages-bootstrap/package.part* | tr -d '\n' > /tmp/pages-package.b64
          test "$(wc -c < /tmp/pages-package.b64)" = 28356
          test "$(sha256sum /tmp/pages-package.b64 | awk '{print $1}')" = fe6208069b2f5db001a64b4178e7513cc7567c9027b1682d9ec64e4f968852c7
          base64 --decode /tmp/pages-package.b64 > /tmp/pages-package.tgz
          test "$(sha256sum /tmp/pages-package.tgz | awk '{print $1}')" = ed66383b9c2101f84938dcd48f09449b9170623b177200da720e0f2a0ab691ee
          gzip -t /tmp/pages-package.tgz
          tar -tzf /tmp/pages-package.tgz

      - name: Extract reviewed Pages package
        shell: bash
        run: tar -xzf /tmp/pages-package.tgz

      - name: Update repository navigation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          badge = '[![Documentation](https://img.shields.io/badge/docs-GitHub%20Pages-28a9ff)](https://conroy1988.github.io/missionchief-toolkit-assets/)'
          if badge not in text:
              anchor = '[![Current Version](https://img.shields.io/badge/version-4.11.2-2563eb)](status/README.md)'
              text = text.replace(anchor, anchor + '\n' + badge)

          old_links = '[Install Toolkit](https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js) · [Greasy Fork](https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit) · [Release Pipeline](docs/RELEASE_PIPELINE.md) · [Changelog](CHANGELOG.md) · [Control Panel](status/README.md)'
          new_links = '[Install Toolkit](https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js) · [Documentation](https://conroy1988.github.io/missionchief-toolkit-assets/) · [Greasy Fork](https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit) · [Release Pipeline](docs/RELEASE_PIPELINE.md) · [Changelog](CHANGELOG.md) · [Control Panel](status/README.md)'
          text = text.replace(old_links, new_links)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate generated documentation site
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile .github/scripts/build_pages_site.py
          node --check docs/site-assets/site.js
          python3 -m json.tool docs/site-data.json > /dev/null
          python3 .github/scripts/build_pages_site.py \
            --output /tmp/toolkit-pages-preview \
            --base-path /missionchief-toolkit-assets/
          test "$(find /tmp/toolkit-pages-preview -type f | wc -l)" -ge 13
          test -s /tmp/toolkit-pages-preview/index.html
          test -s /tmp/toolkit-pages-preview/features/index.html
          test -s /tmp/toolkit-pages-preview/themes/index.html
          test -s /tmp/toolkit-pages-preview/docs/index.html
          test -s /tmp/toolkit-pages-preview/changelog/index.html
          test -s /tmp/toolkit-pages-preview/status/index.html

      - name: Commit non-workflow Pages files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            .github/scripts/build_pages_site.py \
            docs/site-data.json \
            docs/site-assets/site.css \
            docs/site-assets/site.js \
            docs/SITE.md \
            docs/media/README.md
          git commit -m "Add GitHub Pages documentation content"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
