name: Check Toolkit v4.11.0 Distribution Handoff

on:
  pull_request:
    types:
      - opened

permissions:
  contents: read

jobs:
  check:
    name: Check GitHub release asset and Greasy Fork metadata
    if: github.event.pull_request.title == '[Check] Toolkit v4.11.0 Distribution Handoff'
    runs-on: ubuntu-latest
    steps:
      - name: Check distribution versions
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/MissionChief_Map_Command_Toolkit.user.js"
          META_URL="https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.meta.js"

          curl --fail --silent --show-error --location --compressed --max-time 30 \
            --header "Cache-Control: no-cache" \
            "${RELEASE_URL}?cache_bust=$(date +%s%N)" --output github-release.user.js
          RELEASE_VERSION="$(sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' github-release.user.js | head -n 1 | xargs)"

          curl --fail --silent --show-error --location --compressed --max-time 30 \
            --header "Cache-Control: no-cache" \
            "${META_URL}?cache_bust=$(date +%s%N)" --output greasyfork.meta.js
          GREASY_VERSION="$(sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' greasyfork.meta.js | head -n 1 | xargs)"

          echo "GitHub latest release version: ${RELEASE_VERSION:-unavailable}"
          echo "Greasy Fork live version: ${GREASY_VERSION:-unavailable}"
          echo "GitHub release bytes: $(wc -c < github-release.user.js)"
          test "$RELEASE_VERSION" = "4.11.0"
