name: Sync Current README

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-sync-current-readme.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Fetch current main README
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          git checkout origin/main -- README.md
      - name: Verify current main ref
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "be114dcb0fedeeec6618c8f4dbac9ab50675e1b0"
          test "$(git rev-parse origin/main:README.md)" = "955c834b513f15d20474bcd8a0e672dbd148c5db"
      - name: Verify synchronized README blob
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object README.md)" = "955c834b513f15d20474bcd8a0e672dbd148c5db"
      - name: Verify README-only boundary
        shell: bash
        run: |
          set -euo pipefail
          git diff --cached --name-only | sort > /tmp/readme-sync-files.txt
          printf 'README.md\n' > /tmp/expected-readme-sync-files.txt
          diff -u /tmp/expected-readme-sync-files.txt /tmp/readme-sync-files.txt
          test -z "$(git diff --name-only)"
      - name: Commit synchronized README
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Synchronize candidate with current README"
      - name: Push synchronized README
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
