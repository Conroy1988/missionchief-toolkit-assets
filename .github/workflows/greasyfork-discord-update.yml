name: Greasy Fork Release Mirror and Discord Update

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: greasyfork-update-monitor
  cancel-in-progress: false

jobs:
  check-for-update:
    name: Mirror New Greasy Fork Release
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read Greasy Fork version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          META_URL="https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.meta.js"
          STATE_FILE=".github/greasyfork-version.txt"

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "$META_URL" \
            --output greasyfork-script.meta.js

          CURRENT_VERSION="$(
            sed -nE \
              's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' \
              greasyfork-script.meta.js |
              head -n 1 |
              xargs
          )"

          if [[ -z "$CURRENT_VERSION" ]]; then
            echo "::error::Could not detect the @version value from Greasy Fork."
            exit 1
          fi

          if [[ ! "$CURRENT_VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "::error::Greasy Fork returned an unsafe version value: $CURRENT_VERSION"
            exit 1
          fi

          if [[ -f "$STATE_FILE" ]]; then
            PREVIOUS_VERSION="$(tr -d '\r\n ' < "$STATE_FILE")"
          else
            PREVIOUS_VERSION=""
          fi

          echo "Current Greasy Fork version: $CURRENT_VERSION"
          echo "Previously recorded version: ${PREVIOUS_VERSION:-none}"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [[ -n "$PREVIOUS_VERSION" && "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read Greasy Fork changelog
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          HISTORY_URL="https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions?show_all_versions=1&list_all=1"
          rm -f greasyfork-history.html greasyfork-changelog.txt

          for attempt in 1 2 3 4 5 6; do
            echo "Reading changelog for version $CURRENT_VERSION (attempt $attempt of 6)..."

            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --max-time 30 \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "Mozilla/5.0 GitHub-Actions Greasy-Fork-Update-Monitor" \
              "${HISTORY_URL}&cache_bust=$(date +%s%N)" \
              --output greasyfork-history.html; then
              if python3 .github/scripts/extract_greasyfork_changelog.py \
                "$CURRENT_VERSION" \
                greasyfork-history.html \
                greasyfork-changelog.txt; then
                break
              fi
            fi

            if [[ "$attempt" -lt 6 ]]; then
              sleep 10
            fi
          done

          if [[ ! -f greasyfork-changelog.txt ]]; then
            echo "::warning::The History entry was not available yet. Continuing without a changelog."
            : > greasyfork-changelog.txt
          elif [[ -s greasyfork-changelog.txt ]]; then
            echo "Changelog found:"
            cat greasyfork-changelog.txt
          else
            echo "The version was found, but no changelog was entered."
          fi

      - name: Download published userscript
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          INSTALL_URL="https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js"
          rm -f greasyfork-script.user.js

          for attempt in 1 2 3 4 5 6; do
            echo "Downloading published userscript (attempt $attempt of 6)..."

            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --max-time 60 \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "Mozilla/5.0 GitHub-Actions Greasy-Fork-Release-Mirror" \
              "${INSTALL_URL}?cache_bust=$(date +%s%N)" \
              --output greasyfork-script.user.js

            DOWNLOADED_VERSION="$(
              sed -nE \
                's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' \
                greasyfork-script.user.js |
                head -n 1 |
                xargs
            )"

            if [[ "$DOWNLOADED_VERSION" == "$CURRENT_VERSION" ]]; then
              break
            fi

            echo "Downloaded version '${DOWNLOADED_VERSION:-unknown}' does not yet match '$CURRENT_VERSION'."
            rm -f greasyfork-script.user.js

            if [[ "$attempt" -lt 6 ]]; then
              sleep 10
            fi
          done

          if [[ ! -s greasyfork-script.user.js ]]; then
            echo "::error::Could not download the published userscript for version $CURRENT_VERSION."
            exit 1
          fi

      - name: Validate published userscript
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          node --check greasyfork-script.user.js
          npm install --no-save --ignore-scripts acorn@8.15.0
          node .github/scripts/validate_userscript.mjs \
            greasyfork-script.user.js \
            "$CURRENT_VERSION"

      - name: Prepare archive files
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION_DIR="toolkit-releases/v${CURRENT_VERSION}"
          CURRENT_DIR="toolkit-current"
          USER_FILENAME="MissionChief_Map_Command_Toolkit_v${CURRENT_VERSION}.user.js"
          TEXT_FILENAME="MissionChief_Map_Command_Toolkit_v${CURRENT_VERSION}.txt"
          DETECTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          SHA256="$(tr -d '\r\n ' < greasyfork-script.sha256)"

          mkdir -p "$VERSION_DIR" "$CURRENT_DIR"
          cp greasyfork-script.user.js "$VERSION_DIR/$USER_FILENAME"
          cp greasyfork-script.user.js "$VERSION_DIR/$TEXT_FILENAME"
          cp greasyfork-script.user.js "$CURRENT_DIR/MissionChief_Map_Command_Toolkit.user.js"
          cp greasyfork-script.user.js "$CURRENT_DIR/MissionChief_Map_Command_Toolkit.txt"

          cmp --silent "$VERSION_DIR/$USER_FILENAME" "$VERSION_DIR/$TEXT_FILENAME"
          cmp --silent "$CURRENT_DIR/MissionChief_Map_Command_Toolkit.user.js" "$CURRENT_DIR/MissionChief_Map_Command_Toolkit.txt"

          jq -n \
            --arg version "$CURRENT_VERSION" \
            --arg detected_at "$DETECTED_AT" \
            --arg sha256 "$SHA256" \
            --arg source "https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit" \
            --arg install "https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js" \
            '{
              version: $version,
              detectedAt: $detected_at,
              sha256: $sha256,
              source: $source,
              install: $install
            }' > "$VERSION_DIR/release-info.json"

          printf '%s\n' "$VERSION_DIR/$USER_FILENAME" > archive-user-file.txt
          printf '%s\n' "$VERSION_DIR/$TEXT_FILENAME" > archive-text-file.txt

      - name: Commit Greasy Fork archive
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add toolkit-releases toolkit-current

          if git diff --cached --quiet; then
            echo "The published version is already archived."
          else
            git commit -m "Archive MissionChief Toolkit v${CURRENT_VERSION} from Greasy Fork"
            git push
          fi

      - name: Create or update GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="v${CURRENT_VERSION}"
          USER_FILE="$(cat archive-user-file.txt)"
          TEXT_FILE="$(cat archive-text-file.txt)"
          TARGET_SHA="$(git rev-parse HEAD)"

          {
            echo "Automatically mirrored from the published Greasy Fork release."
            echo
            if [[ -s greasyfork-changelog.txt ]]; then
              echo "## What changed"
              echo
              cat greasyfork-changelog.txt
              echo
            fi
            echo "## Source"
            echo
            echo "- Greasy Fork: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit"
            echo "- SHA-256: $(tr -d '\r\n ' < greasyfork-script.sha256)"
          } > github-release-notes.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$USER_FILE" "$TEXT_FILE" --clobber
            gh release edit "$TAG" \
              --title "MissionChief Map Command Toolkit v${CURRENT_VERSION}" \
              --notes-file github-release-notes.md
          else
            gh release create "$TAG" \
              "$USER_FILE" \
              "$TEXT_FILE" \
              --target "$TARGET_SHA" \
              --title "MissionChief Map Command Toolkit v${CURRENT_VERSION}" \
              --notes-file github-release-notes.md \
              --latest
          fi

      - name: Post update to Discord
        if: steps.version.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATE_WEBHOOK }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          PREVIOUS_VERSION: ${{ steps.version.outputs.previous }}
          SCRIPT_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit
          HISTORY_URL: https://greasyfork.org/en/scripts/586018-missionchief-map-command-toolkit/versions
          INSTALL_URL: https://update.greasyfork.org/scripts/586018/MissionChief%20Map%20Command%20Toolkit.user.js
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "::error::The DISCORD_UPDATE_WEBHOOK repository secret has not been configured."
            exit 1
          fi

          CHANGELOG="$(cat greasyfork-changelog.txt 2>/dev/null || true)"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg current "$CURRENT_VERSION" \
            --arg previous "$PREVIOUS_VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg script_url "$SCRIPT_URL" \
            --arg history_url "$HISTORY_URL" \
            --arg install_url "$INSTALL_URL" \
            --arg release_url "$RELEASE_URL" \
            --arg timestamp "$TIMESTAMP" \
            '{
              username: "MissionChief Toolkit Updates",
              allowed_mentions: { parse: [] },
              embeds: [
                {
                  title: "MissionChief Map Command Toolkit Updated",
                  description: "A new version is live on Greasy Fork and has been archived on GitHub.",
                  url: $script_url,
                  color: 3447003,
                  fields: (
                    [
                      { name: "Previous Version", value: ("`" + $previous + "`"), inline: true },
                      { name: "New Version", value: ("`" + $current + "`"), inline: true }
                    ]
                    +
                    (if ($changelog | length) > 0 then
                      [{ name: "What Changed", value: $changelog, inline: false }]
                    else
                      []
                    end)
                    +
                    [
                      {
                        name: "Update and Archive",
                        value: ("[View on Greasy Fork](" + $script_url + ")\n[View version history](" + $history_url + ")\n[Install or update the script](" + $install_url + ")\n[Download the GitHub release](" + $release_url + ")"),
                        inline: false
                      }
                    ]
                  ),
                  footer: { text: "MissionChief Map Command Toolkit" },
                  timestamp: $timestamp
                }
              ]
            }' > discord-payload.json

          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "Content-Type: application/json" \
            --data @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}?wait=true"

          echo
          echo "Discord update notification sent."

      - name: Save latest version
        if: steps.version.outputs.changed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          STATE_FILE=".github/greasyfork-version.txt"
          printf '%s\n' "$CURRENT_VERSION" > "$STATE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "No version-state change to commit."
            exit 0
          fi

          git commit -m "Track Greasy Fork version ${CURRENT_VERSION}"
          git push
