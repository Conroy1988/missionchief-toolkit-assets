name: Release Readiness Check

on:
  workflow_call:
    inputs:
      version:
        description: "Toolkit version to validate without publishing"
        required: true
        type: string
    secrets:
      DISCORD_RELEASE_WEBHOOK:
        required: true
      MIGRATION_REPO_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Toolkit version to validate without publishing"
        required: true
        default: "4.10.4"
        type: string

permissions:
  contents: read

concurrency:
  group: toolkit-release-readiness
  cancel-in-progress: false

jobs:
  readiness:
    name: Verify release pipeline readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Validate required secrets
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${DISCORD_RELEASE_WEBHOOK:-}" ]] || { echo "::error::DISCORD_RELEASE_WEBHOOK is not configured."; exit 1; }
          [[ -n "${MIGRATION_REPO_TOKEN:-}" ]] || { echo "::error::MIGRATION_REPO_TOKEN is not configured."; exit 1; }
          echo "Required release secrets are configured."

      - name: Validate release settings
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || { echo "::error::Invalid version: $RELEASE_VERSION"; exit 1; }
          [[ "$(jq -r '.greasyFork.syncEnabled' .github/release-settings.json)" == "true" ]] || { echo "::error::Greasy Fork synchronization is disabled."; exit 1; }
          [[ "$(jq -r '.release.externalMigrationBackup' .github/release-settings.json)" == "Conroy1988/missionchief-map-command-toolkit-private" ]] || { echo "::error::Private migration repository is not configured correctly."; exit 1; }

      - name: Validate canonical userscript
        run: python3 .github/scripts/validate_userscript.py

      - name: Check JavaScript syntax
        run: node --check src/MissionChief_Map_Command_Toolkit.user.js

      - name: Resolve released performance baseline
        id: performance_base
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          BASE_REF="$(git tag --merged HEAD --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)"
          [[ -n "$BASE_REF" ]] || BASE_REF="HEAD^"

          if git cat-file -e "${BASE_REF}:${SOURCE}" 2>/dev/null; then
            git show "${BASE_REF}:${SOURCE}" > /tmp/performance-base.user.js
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "ref=$BASE_REF" >> "$GITHUB_OUTPUT"
            echo "Release performance baseline: $BASE_REF"
          else
            echo "::warning::No released performance baseline is available; only absolute budgets will be enforced."
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "ref=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release performance budget
        id: performance
        shell: bash
        run: |
          set +e
          ARGS=(
            --candidate src/MissionChief_Map_Command_Toolkit.user.js
            --policy .github/performance-budget.json
            --json-output performance-budget-report.json
            --markdown-output performance-budget-report.md
          )
          if [[ "${{ steps.performance_base.outputs.available }}" == "true" ]]; then
            ARGS+=(--base /tmp/performance-base.user.js)
          fi
          python3 .github/scripts/check_performance_budget.py "${ARGS[@]}"
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish release performance summary
        if: always()
        shell: bash
        run: |
          if [[ -f performance-budget-report.md ]]; then
            cat performance-budget-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Performance report was not created."
            exit 1
          fi

      - name: Upload release performance diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-toolkit-release-performance-budget
          path: |
            performance-budget-report.json
            performance-budget-report.md
          if-no-files-found: error
          retention-days: 30

      - name: Stop on release performance regression
        if: steps.performance.outputs.exit_code != '0'
        run: |
          echo "Release performance-budget checks failed. Review the workflow summary and diagnostics artifact."
          exit 1

      - name: Verify distribution parity
        run: cmp --silent dist/MissionChief_Map_Command_Toolkit.user.js dist/MissionChief_Map_Command_Toolkit.txt

      - name: Prepare release bundle without publishing
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/prepare_release_bundle.py "$RELEASE_VERSION"

      - name: Verify bundle integrity
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          USER_FILE="release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.user.js"
          TXT_FILE="release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.txt"
          MANIFEST="release-bundle/release-manifest-v${RELEASE_VERSION}.json"
          cmp --silent "$USER_FILE" "$TXT_FILE"
          EXPECTED_HASH="$(jq -r '.sha256' "$MANIFEST")"
          ACTUAL_HASH="$(sha256sum "$USER_FILE" | awk '{print $1}')"
          [[ "$EXPECTED_HASH" == "$ACTUAL_HASH" ]] || { echo "::error::Release bundle SHA-256 mismatch."; exit 1; }

      - name: Verify private migration repository access
        env:
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PRIVATE_REPO="Conroy1988/missionchief-map-command-toolkit-private"

          HTTP_CODE="$(curl --silent --show-error --output private-repo-check.json --write-out '%{http_code}' \
            --header "Authorization: Bearer ${MIGRATION_REPO_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PRIVATE_REPO}")"

          if [[ "$HTTP_CODE" != "200" ]]; then
            MESSAGE="$(jq -r '.message // "Unknown GitHub API error"' private-repo-check.json 2>/dev/null || true)"
            echo "::error::MIGRATION_REPO_TOKEN cannot access ${PRIVATE_REPO} (HTTP ${HTTP_CODE}: ${MESSAGE}). Check that the fine-grained token selects this repository and has Contents: Read and write."
            exit 1
          fi

          PERMISSION="$(jq -r '.permissions.push // false' private-repo-check.json)"
          [[ "$PERMISSION" == "true" ]] || { echo "::error::MIGRATION_REPO_TOKEN can read the private repository but does not have push permission. Set Contents to Read and write."; exit 1; }
          echo "Private migration repository read/write permission verified."

      - name: Verify Greasy Fork metadata endpoint
        shell: bash
        run: |
          set -euo pipefail
          META_URL="$(jq -r '.greasyFork.metadataUrl' .github/release-settings.json)"
          SCRIPT_URL="$(jq -r '.greasyFork.scriptUrl' .github/release-settings.json)"

          curl --fail --silent --show-error --location --compressed --max-time 30 \
            --header "Cache-Control: no-cache" \
            "${META_URL}?cache_bust=$(date +%s%N)" -o greasyfork.meta.js

          LIVE_VERSION="$(sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' greasyfork.meta.js | head -n 1 | xargs)"
          [[ -n "$LIVE_VERSION" ]] || { echo "::error::Could not read the current Greasy Fork version from the metadata endpoint."; exit 1; }
          echo "Current Greasy Fork version: $LIVE_VERSION"

          PAGE_STATUS="$(curl --silent --show-error --location --max-time 30 --output /dev/null --write-out '%{http_code}' "$SCRIPT_URL" || true)"
          if [[ "$PAGE_STATUS" != "200" ]]; then
            echo "::warning::Greasy Fork's HTML page returned HTTP ${PAGE_STATUS:-unavailable} to the GitHub runner. This is commonly caused by automated-request blocking and does not affect metadata verification or release syncing."
          else
            echo "Greasy Fork HTML page is reachable."
          fi

      - name: Write readiness summary
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          HASH="$(jq -r '.sha256' "release-bundle/release-manifest-v${RELEASE_VERSION}.json")"
          {
            echo "# Toolkit v${RELEASE_VERSION} release readiness"
            echo
            echo "- ✅ Required repository secrets configured"
            echo "- ✅ Release settings enabled"
            echo "- ✅ Canonical userscript validated"
            echo "- ✅ JavaScript syntax checked"
            echo "- ✅ Static performance budget passed"
            echo "- ✅ Distribution files are byte-identical"
            echo "- ✅ Changelog and release bundle prepared"
            echo "- ✅ SHA-256 verified: \`${HASH}\`"
            echo "- ✅ Private migration repository read/write permission verified"
            echo "- ✅ Greasy Fork metadata endpoint verified"
            echo "- ⏸️ No GitHub Release created"
            echo "- ⏸️ Greasy Fork not changed"
            echo "- ⏸️ Discord not notified"
          } >> "$GITHUB_STEP_SUMMARY"
