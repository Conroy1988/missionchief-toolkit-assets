name: Branch Cleanup Audit

run-name: Branch cleanup audit or guarded deletion

on:
  schedule:
    - cron: "11 6 * * 1"
  workflow_dispatch:
    inputs:
      delete_fully_merged:
        description: Delete branches proven merged into main
        required: true
        default: false
        type: boolean
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  audit:
    if: >-
      github.event_name != 'issue_comment' ||
      (github.actor == github.repository_owner &&
       github.event.comment.body == '/cleanup-branches SAFE')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Inventory and optionally delete merged branches
        env:
          GH_TOKEN: ${{ github.token }}
          DELETE_MERGED: ${{ github.event_name == 'issue_comment' || (github.event_name == 'workflow_dispatch' && inputs.delete_fully_merged) }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

          gh pr list \
            --state open \
            --limit 500 \
            --json headRefName \
            > /tmp/open-prs.json

          gh pr list \
            --state merged \
            --limit 500 \
            --json headRefName,headRefOid \
            > /tmp/merged-prs.json

          jq -r '.[].headRefName' /tmp/open-prs.json | sort -u > /tmp/open-heads.txt
          jq -r '.[] | [.headRefName, .headRefOid] | @tsv' /tmp/merged-prs.json \
            | sort -u > /tmp/merged-heads.tsv

          : > /tmp/candidates.txt
          : > /tmp/protected.txt
          : > /tmp/deleted.txt
          : > /tmp/delete-failed.txt

          while IFS= read -r ref; do
            branch="${ref#origin/}"
            [[ "$branch" == "main" || "$branch" == "HEAD" ]] && continue

            if grep -Fxq "$branch" /tmp/open-heads.txt; then
              echo "$branch — open pull request" >> /tmp/protected.txt
              continue
            fi

            branch_sha="$(git rev-parse "origin/$branch")"

            if git merge-base --is-ancestor "origin/$branch" origin/main; then
              echo "$branch" >> /tmp/candidates.txt
              continue
            fi

            if awk -F '\t' -v name="$branch" -v sha="$branch_sha" \
              '$1 == name && $2 == sha { found = 1 } END { exit(found ? 0 : 1) }' \
              /tmp/merged-heads.tsv; then
              echo "$branch" >> /tmp/candidates.txt
            else
              echo "$branch — not proven merged or changed after merge" >> /tmp/protected.txt
            fi
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin | sort)

          sort -u -o /tmp/candidates.txt /tmp/candidates.txt
          sort -u -o /tmp/protected.txt /tmp/protected.txt

          if [[ "$DELETE_MERGED" == "true" && -s /tmp/candidates.txt ]]; then
            while IFS= read -r branch; do
              [[ -n "$branch" ]] || continue
              encoded_branch="$(python - "$branch" <<'PY'
          import sys
          from urllib.parse import quote
          print(quote(sys.argv[1], safe=''))
          PY
              )"
              if gh api \
                --method DELETE \
                "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded_branch}" \
                >/dev/null 2>&1; then
                echo "$branch" >> /tmp/deleted.txt
              else
                echo "$branch — deletion rejected or branch protected" >> /tmp/delete-failed.txt
              fi
            done < /tmp/candidates.txt
          fi

          sort -u -o /tmp/deleted.txt /tmp/deleted.txt
          sort -u -o /tmp/delete-failed.txt /tmp/delete-failed.txt

          jq -n \
            --arg mode "$([[ "$DELETE_MERGED" == "true" ]] && echo delete-merged || echo read-only)" \
            --rawfile candidates /tmp/candidates.txt \
            --rawfile deleted /tmp/deleted.txt \
            --rawfile deleteFailed /tmp/delete-failed.txt \
            --rawfile protected /tmp/protected.txt \
            '{
              generatedAt: (now | todateiso8601),
              mode: $mode,
              candidates: ($candidates | split("\n") | map(select(length > 0))),
              deleted: ($deleted | split("\n") | map(select(length > 0))),
              deletionFailures: ($deleteFailed | split("\n") | map(select(length > 0))),
              protectedOrUnmerged: ($protected | split("\n") | map(select(length > 0)))
            }' > branch-cleanup-report.json

          {
            echo '# Branch Cleanup Audit'
            echo
            if [[ "$DELETE_MERGED" == "true" ]]; then
              echo '> Guarded deletion mode: only branches with no open PR and a tip proven merged into `main` were eligible.'
            else
              echo '> Read-only mode: this run deleted nothing.'
            fi
            echo
            echo '## Deleted merged branches'
            if [[ -s /tmp/deleted.txt ]]; then
              sed 's/^/- `/' /tmp/deleted.txt | sed 's/$/`/'
            else
              echo '- None'
            fi
            echo
            echo '## Deletion failures'
            if [[ -s /tmp/delete-failed.txt ]]; then
              sed 's/^/- /' /tmp/delete-failed.txt
            else
              echo '- None'
            fi
            echo
            echo '## Preserved branches'
            if [[ -s /tmp/protected.txt ]]; then
              sed 's/^/- /' /tmp/protected.txt
            else
              echo '- None'
            fi
          } > branch-cleanup-report.md

      - name: Publish branch audit summary
        run: cat branch-cleanup-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report owner-command result
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
          CONTROL_ISSUE: ${{ github.event.issue.number }}
        run: gh issue comment "$CONTROL_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file branch-cleanup-report.md

      - name: Upload branch audit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: branch-cleanup-audit
          path: |
            branch-cleanup-report.json
            branch-cleanup-report.md
          if-no-files-found: error
          retention-days: 30
