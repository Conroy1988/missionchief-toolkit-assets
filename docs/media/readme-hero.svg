<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief Map Command Toolkit Operational Window Suite</title>
  <desc id="desc">A governed MissionChief operations platform presenting the Operational Window Suite, mission intelligence, fleet and map command, responsive interfaces, GitHub-authoritative delivery and private recovery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#030812"/><stop offset="0.52" stop-color="#081a2b"/><stop offset="1" stop-color="#160b17"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#43dcff"/><stop offset="0.49" stop-color="#7de8ff"/><stop offset="0.51" stop-color="#ff7b87"/><stop offset="1" stop-color="#d63345"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#143e55" stop-opacity="0.86"/><stop offset="1" stop-color="#07131f" stop-opacity="0.96"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/></linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#b9eaff" stroke-opacity="0.045"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/></filter>
  </defs>
  <rect width="1600" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="32" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1597" height="637" rx="30.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
  <g font-family="Segoe UI,Arial,sans-serif">
    <g transform="translate(70 50)">
      <rect width="248" height="38" rx="19" fill="#0c273d" stroke="#43caff" stroke-opacity="0.55"/>
      <circle cx="20" cy="19" r="6" fill="#52d5ff"/>
      <text x="42" y="25" fill="#c4edff" font-size="14" font-weight="800" letter-spacing="1.8">VERIFIED DELIVERY</text>
    </g>
    <g transform="translate(334 50)">
      <rect width="326" height="38" rx="19" fill="#28151d" stroke="#ef5d69" stroke-opacity="0.52"/>
      <circle cx="20" cy="19" r="6" fill="#ff7b87"/>
      <text x="42" y="25" fill="#ffe1e5" font-size="13" font-weight="800" letter-spacing="1.4">GITHUB-AUTHORITATIVE DELIVERY</text>
    </g>

    <text x="70" y="168" fill="#ffffff" font-size="56" font-weight="900" letter-spacing="1">MAP COMMAND TOOLKIT</text>
    <text x="74" y="218" fill="#85d9ff" font-size="24" font-weight="750" letter-spacing="4.2">OPERATIONAL WINDOW SUITE</text>
    <text x="74" y="266" fill="#d9e8f2" font-size="18">Live evidence · Mission intelligence · Fleet identity · Geographic command</text>

    <g transform="translate(74 296)" font-size="13" font-weight="800" letter-spacing="0.8">
      <rect width="176" height="42" rx="9" fill="#0d2b42" stroke="#45cbff" stroke-opacity="0.52"/>
      <text x="23" y="27" fill="#d9f5ff">4 WINDOW FAMILIES</text>
      <rect x="192" width="150" height="42" rx="9" fill="#12233a" stroke="#8bdfff" stroke-opacity="0.40"/>
      <text x="219" y="27" fill="#d9f5ff">7 INTERFACES</text>
      <rect x="358" width="210" height="42" rx="9" fill="#29151d" stroke="#ef5d69" stroke-opacity="0.52"/>
      <text x="385" y="27" fill="#ffe1e5">DESKTOP · TABLET · iOS</text>
    </g>

