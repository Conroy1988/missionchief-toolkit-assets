name: Transport Sweep Discovery

on:
  push:
    branches:
      - chore/transport-sweep-discovery

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Capture failed package log tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/diagnostics
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/jobs/87777764256/logs" \
            > /tmp/issue94-job.log
          tail -n 120 /tmp/issue94-job.log > .github/diagnostics/issue-94-package-error.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/diagnostics/issue-94-package-error.txt
          if git diff --cached --quiet; then
            echo "Diagnostic already current."
            exit 0
          fi
          git commit -m "Capture Issue 94 package traceback [skip ci]"
          git push origin HEAD:chore/transport-sweep-discovery
