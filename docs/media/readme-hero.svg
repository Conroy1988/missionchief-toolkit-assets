      <text x="728" y="22" text-anchor="middle" fill="#d9e7f0" font-size="11" font-weight="850" letter-spacing="1.55">SEE THE MISSION · READ THE FLEET · COMMAND THE MAP · RECONCILE THE OPERATION</text>
