name: Apply auto-load vehicles feature

on:
  push:
    branches:
      - feature/auto-load-all-vehicles
    paths:
      - .github/workflows/apply-auto-load-all-vehicles.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feature/auto-load-all-vehicles
          fetch-depth: 0

      - name: Apply guarded feature patch
        run: python3 .github/scripts/apply_auto_load_all_vehicles.py

      - name: Validate JavaScript syntax
        run: node --check src/MissionChief_Map_Command_Toolkit.user.js

      - name: Run canonical userscript validator
        run: python3 .github/scripts/validate_userscript.py

      - name: Validate feature anchors
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('src/MissionChief_Map_Command_Toolkit.user.js').read_text(encoding='utf-8')
          required = [
              '// @version      4.12.0',
              "version: '4.12.0'",
              'autoLoadAllVehicles: false',
              'AUTO_LOAD_ALL_VEHICLES_SELECTOR',
              'a.missing_vehicles_load[href*="/missing_vehicles"]',
              "makeToggleButton('autoLoadAllVehicles'",
              'installAutoLoadAllVehicles();',
              'stopAutoLoadAllVehicles();'
          ]
          missing = [value for value in required if value not in source]
          if missing:
              raise SystemExit(f'Missing feature anchors: {missing}')
          if source.count('function installAutoLoadAllVehicles()') != 1:
              raise SystemExit('installAutoLoadAllVehicles declaration count is not one.')
          if source.count('function scanAutoLoadAllVehicles()') != 1:
              raise SystemExit('scanAutoLoadAllVehicles declaration count is not one.')
          if source.count('autoLoadAllVehicles: false') != 1:
              raise SystemExit('autoLoadAllVehicles default count is not one.')
          PY

      - name: Commit feature implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/MissionChief_Map_Command_Toolkit.user.js CHANGELOG.md .github/workflows/apply-auto-load-all-vehicles.yml .github/scripts/apply_auto_load_all_vehicles.py
          git commit -m "Add optional automatic vehicle batch loading"
          git push origin HEAD:feature/auto-load-all-vehicles

# Second commit intentionally retriggers this workflow after registration on the branch.
