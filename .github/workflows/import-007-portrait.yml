name: Import 007 Portrait Asset

on:
  push:
    paths:
      - '.asset-staging/007-portrait-trigger.txt'

permissions:
  contents: write

concurrency:
  group: import-007-portrait
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download transparent Daniel Craig Bond portrait
        run: |
          mkdir -p themes/james-bond/payout
          curl --fail --location --retry 3 --retry-delay 2 \
            'https://pngimg.com/uploads/james_bond/james_bond_PNG36.png' \
            --output themes/james-bond/payout/daniel-craig-007-portrait.png
          file themes/james-bond/payout/daniel-craig-007-portrait.png
          test "$(stat -c%s themes/james-bond/payout/daniel-craig-007-portrait.png)" -gt 20000
      - name: Remove one-use importer
        run: |
          rm -rf .asset-staging
          rm -f .github/workflows/import-007-portrait.yml
      - name: Commit portrait asset
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add transparent Daniel Craig 007 payout portrait'
          git push
