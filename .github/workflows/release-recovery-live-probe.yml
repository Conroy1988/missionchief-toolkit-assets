name: Release Recovery Live Probe
run-name: Release recovery read-only probe · PR ${{ github.event.pull_request.number }}

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - ".github/scripts/download_verified_release_bundle.sh"
      - ".github/workflows/release-recovery-live-probe.yml"

permissions:
  contents: read

concurrency:
  group: toolkit-release-recovery-live-probe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  probe:
    name: Verify immutable v4.11.2 release bundle
    if: github.event.pull_request.number == 30
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out pull request
        uses: actions/checkout@v7

      - name: Download and verify v4.11.2 release bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: "4.11.2"
          REQUIRE_STABLE_ASSETS: "true"
        run: bash .github/scripts/download_verified_release_bundle.sh

      - name: Publish verification summary
        run: |
          {
            echo "# Recovery bundle probe"
            echo
            echo "- Version: \`v$(jq -r '.version' release-bundle/recovery-verification.json)\`"
            echo "- SHA-256: \`$(jq -r '.sha256' release-bundle/recovery-verification.json)\`"
            echo "- Result: verified"
          } >> "$GITHUB_STEP_SUMMARY"
