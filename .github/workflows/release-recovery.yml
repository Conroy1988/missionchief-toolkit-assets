name: Release Recovery
run-name: Release recovery · ${{ inputs.operation }} · v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Recovery operation"
        required: true
        type: choice
        options:
          - verify-release
          - retry-greasyfork
          - retry-private-backup
          - retry-discord
          - rebuild-dashboard
          - repair-stable-assets
      version:
        description: "Toolkit release version without the v prefix"
        required: true
        type: string
      discord_state:
        description: "Dashboard rebuild only: preserve, posted, or not-posted"
        required: true
        default: preserve
        type: choice
        options:
          - preserve
          - posted
          - not-posted
      confirmation:
        description: "Enter the exact confirmation phrase shown in docs/RELEASE_RECOVERY.md"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: toolkit-production-release
  cancel-in-progress: false

jobs:
  recover:
    name: Execute controlled release recovery
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out latest main authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate operation and confirmation
        id: safety
        env:
          GH_TOKEN: ${{ github.token }}
          OPERATION: ${{ inputs.operation }}
          RELEASE_VERSION: ${{ inputs.version }}
          CONFIRMATION: ${{ inputs.confirmation }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::Invalid release version: $RELEASE_VERSION"
            exit 1
          }

          case "$OPERATION" in
            verify-release) EXPECTED="VERIFY ${RELEASE_VERSION}" ;;
            retry-greasyfork) EXPECTED="RETRY GREASYFORK ${RELEASE_VERSION}" ;;
            retry-private-backup) EXPECTED="RETRY BACKUP ${RELEASE_VERSION}" ;;
            retry-discord) EXPECTED="RETRY DISCORD ${RELEASE_VERSION}" ;;
            rebuild-dashboard) EXPECTED="REBUILD DASHBOARD ${RELEASE_VERSION}" ;;
            repair-stable-assets) EXPECTED="REPAIR ASSETS ${RELEASE_VERSION}" ;;
            *) echo "::error::Unsupported recovery operation: $OPERATION"; exit 1 ;;
          esac
          [[ "$CONFIRMATION" == "$EXPECTED" ]] || {
            echo "::error::Confirmation mismatch. Enter exactly: $EXPECTED"
            exit 1
          }

          LATEST_TAG="$(gh release view --json tagName --jq '.tagName')"
          if [[ "$OPERATION" != "verify-release" && "$LATEST_TAG" != "v${RELEASE_VERSION}" ]]; then
            echo "::error::Write recovery operations may target only the latest GitHub Release (${LATEST_TAG}), not v${RELEASE_VERSION}."
            exit 1
          fi

          if [[ "$OPERATION" == "retry-private-backup" || "$OPERATION" == "rebuild-dashboard" ]]; then
            [[ -n "${MIGRATION_REPO_TOKEN:-}" ]] || { echo "::error::MIGRATION_REPO_TOKEN is not configured."; exit 1; }
          fi
          if [[ "$OPERATION" == "retry-discord" ]]; then
            [[ -n "${DISCORD_RELEASE_WEBHOOK:-}" ]] || { echo "::error::DISCORD_RELEASE_WEBHOOK is not configured."; exit 1; }
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Safety gate passed for ${OPERATION} on v${RELEASE_VERSION}."

      - name: Verify recovery-state self-tests
        if: >-
          inputs.operation == 'retry-greasyfork' ||
          inputs.operation == 'retry-private-backup' ||
          inputs.operation == 'retry-discord' ||
          inputs.operation == 'rebuild-dashboard'
        run: |
          python3 .github/scripts/release_state_branch.py --self-test
          python3 .github/scripts/release_recovery_state.py --self-test

      - name: Prepare governed release-state worktree
        id: release_state
        if: >-
          inputs.operation == 'retry-greasyfork' ||
          inputs.operation == 'retry-private-backup' ||
          inputs.operation == 'retry-discord' ||
          inputs.operation == 'rebuild-dashboard'
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/release_state_branch.py prepare \
            --worktree "$RUNNER_TEMP/release-state"

      - name: Seed recovery ledger from verified main compatibility state
        if: >-
          inputs.operation == 'retry-greasyfork' ||
          inputs.operation == 'retry-private-backup' ||
          inputs.operation == 'retry-discord'
        env:
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          RELEASE_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/release_recovery_state.py seed \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION"

      - name: Verify immutable GitHub Release bundle
        id: bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          REQUIRE_STABLE_ASSETS: ${{ inputs.operation == 'repair-stable-assets' && 'false' || 'true' }}
        shell: bash
        run: bash .github/scripts/download_verified_release_bundle.sh

      - name: Re-emit Greasy Fork release event when required
        if: inputs.operation == 'retry-greasyfork'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          META_URL="$(jq -r '.greasyFork.metadataUrl' .github/release-settings.json)"
          LIVE_VERSION="$(curl --fail --silent --show-error --location --compressed --max-time 30 \
            --header 'Cache-Control: no-cache' \
            "${META_URL}?cache_bust=$(date +%s%N)" | sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' | head -n 1 | xargs || true)"

          if [[ "$LIVE_VERSION" != "$RELEASE_VERSION" ]]; then
            gh release view "v${RELEASE_VERSION}" --json name,body > /tmp/release-state.json
            jq -r '.body' /tmp/release-state.json > /tmp/release-notes.md
            TITLE="$(jq -r '.name' /tmp/release-state.json)"
            gh release edit "v${RELEASE_VERSION}" --title "$TITLE" --notes-file /tmp/release-notes.md --latest
            echo "Re-saved v${RELEASE_VERSION} to emit a fresh release update event."
          else
            echo "Greasy Fork already reports v${RELEASE_VERSION}; no webhook retry was emitted."
          fi

          SYNCED=false
          for attempt in $(seq 1 30); do
            LIVE_VERSION="$(curl --fail --silent --show-error --location --compressed --max-time 30 \
              --header 'Cache-Control: no-cache' \
              "${META_URL}?cache_bust=$(date +%s%N)" | sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' | head -n 1 | xargs || true)"
            echo "Greasy Fork attempt ${attempt}/30: ${LIVE_VERSION:-unavailable}"
            [[ "$LIVE_VERSION" == "$RELEASE_VERSION" ]] && { SYNCED=true; break; }
            sleep 60
          done
          [[ "$SYNCED" == "true" ]] || { echo "::error::Greasy Fork did not synchronize v${RELEASE_VERSION}."; exit 1; }

          python3 .github/scripts/check_asset_health.py \
            --mode live \
            --json-output /tmp/recovery-asset-health.json \
            --markdown-output /tmp/recovery-asset-health.md
          python3 .github/scripts/check_distribution_body_parity.py \
            --report /tmp/recovery-asset-health.json \
            --markdown /tmp/recovery-asset-health.md

      - name: Record Greasy Fork recovery on release-state
        if: inputs.operation == 'retry-greasyfork'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/release_recovery_state.py record-greasyfork \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION"

      - name: Retry private migration backup
        id: backup
        if: inputs.operation == 'retry-private-backup'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
          ALLOW_EXISTING_IDENTICAL: "true"
          UPDATE_CURRENT_POINTER: "true"
        shell: bash
        run: bash .github/scripts/backup_release_to_private_repo.sh

      - name: Record private backup recovery on release-state
        if: inputs.operation == 'retry-private-backup'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          BACKUP_COMMIT: ${{ steps.backup.outputs.backup_commit }}
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/release_recovery_state.py record-backup \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION" \
            --backup-commit "$BACKUP_COMMIT"

      - name: Claim Discord retry on release-state without posting
        id: discord_guard
        if: inputs.operation == 'retry-discord'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          NONCE="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python3 .github/scripts/release_recovery_state.py claim-discord \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION" \
            --nonce "$NONCE"

      - name: Retry verified Discord release announcement
        if: inputs.operation == 'retry-discord' && steps.discord_guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_URL: ${{ steps.bundle.outputs.release_url }}
          BACKUP_COMMIT: ${{ steps.discord_guard.outputs.backup_commit }}
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT_URL="$(jq -r '.greasyFork.scriptUrl' .github/release-settings.json)"
          INSTALL_URL="$(jq -r '.greasyFork.installUrl' .github/release-settings.json)"
          HASH="$(jq -r '.sha256' "release-bundle/release-manifest-v${RELEASE_VERSION}.json")"
          python3 .github/scripts/build_discord_release_payload.py \
            --mode primary \
            --version "$RELEASE_VERSION" \
            --changelog "release-bundle/CHANGELOG-v${RELEASE_VERSION}.md" \
            --output /tmp/discord-release-payload.json \
            --release-url "$RELEASE_URL" \
            --script-url "$SCRIPT_URL" \
            --install-url "$INSTALL_URL" \
            --sha256 "$HASH" \
            --backup-commit "$BACKUP_COMMIT"

          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            --request POST --header "Content-Type: application/json" \
            --data @/tmp/discord-release-payload.json "${DISCORD_WEBHOOK_URL}?wait=true" \
            > /tmp/discord-release-response.json
          jq -e '.id and .channel_id' /tmp/discord-release-response.json >/dev/null

      - name: Finalize Discord recovery on release-state
        if: inputs.operation == 'retry-discord' && steps.discord_guard.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          EXPECTED_NONCE: ${{ steps.discord_guard.outputs.nonce }}
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/release_recovery_state.py finalize-discord \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION" \
            --nonce "$EXPECTED_NONCE"

      - name: Verify private archive for dashboard rebuild
        id: rebuild_backup
        if: inputs.operation == 'rebuild-dashboard'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_HASH: ${{ steps.bundle.outputs.release_sha256 }}
          MIGRATION_REPO_TOKEN: ${{ secrets.MIGRATION_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          WORK="$(mktemp -d)"
          BASIC_AUTH="$(printf 'x-access-token:%s' "$MIGRATION_REPO_TOKEN" | base64 -w0)"
          git -c http.extraheader="AUTHORIZATION: basic ${BASIC_AUTH}" clone --depth 1 \
            https://github.com/Conroy1988/missionchief-map-command-toolkit-private.git "$WORK/private"
          TARGET="$WORK/private/releases/v${RELEASE_VERSION}"
          [[ -d "$TARGET" ]] || { echo "::error::Private archive for v${RELEASE_VERSION} is missing."; exit 1; }
          [[ "$(jq -r '.sha256 // empty' "$TARGET/backup-record.json")" == "$RELEASE_HASH" ]] || {
            echo "::error::Private archive SHA-256 does not match GitHub Release."
            exit 1
          }
          BACKUP_COMMIT="$(git -C "$WORK/private" log -1 --format=%H -- "releases/v${RELEASE_VERSION}")"
          [[ -n "$BACKUP_COMMIT" ]] || { echo "::error::Could not resolve private backup commit."; exit 1; }
          echo "backup_commit=$BACKUP_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Rebuild verified release dashboard on release-state
        if: inputs.operation == 'rebuild-dashboard'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_HASH: ${{ steps.bundle.outputs.release_sha256 }}
          RELEASE_URL: ${{ steps.bundle.outputs.release_url }}
          BACKUP_COMMIT: ${{ steps.rebuild_backup.outputs.backup_commit }}
          DISCORD_STATE: ${{ inputs.discord_state }}
          RELEASE_STATE_ROOT: ${{ steps.release_state.outputs.root }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          META_URL="$(jq -r '.greasyFork.metadataUrl' .github/release-settings.json)"
          LIVE_VERSION="$(curl --fail --silent --show-error --location --compressed --max-time 30 \
            --header 'Cache-Control: no-cache' \
            "${META_URL}?cache_bust=$(date +%s%N)" | sed -nE 's|^//[[:space:]]*@version[[:space:]]+(.+)$|\1|p' | head -n 1 | xargs)"
          [[ "$LIVE_VERSION" == "$RELEASE_VERSION" ]] || { echo "::error::Greasy Fork does not report v${RELEASE_VERSION}."; exit 1; }

          python3 .github/scripts/release_recovery_state.py rebuild-dashboard \
            --state-root "$RELEASE_STATE_ROOT" \
            --version "$RELEASE_VERSION" \
            --sha256 "$RELEASE_HASH" \
            --release-url "$RELEASE_URL" \
            --backup-commit "$BACKUP_COMMIT" \
            --discord-state "$DISCORD_STATE"

      - name: Repair stable GitHub Release assets
        if: inputs.operation == 'repair-stable-assets'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_HASH: ${{ steps.bundle.outputs.release_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${RELEASE_VERSION}"
          cp "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.user.js" /tmp/MissionChief_Map_Command_Toolkit.user.js
          cp "release-bundle/MissionChief_Map_Command_Toolkit_v${RELEASE_VERSION}.txt" /tmp/MissionChief_Map_Command_Toolkit.txt
          gh release upload "$TAG" \
            /tmp/MissionChief_Map_Command_Toolkit.user.js \
            /tmp/MissionChief_Map_Command_Toolkit.txt \
            --clobber

          rm -rf /tmp/repaired-release
          mkdir -p /tmp/repaired-release
          gh release download "$TAG" --dir /tmp/repaired-release \
            --pattern 'MissionChief_Map_Command_Toolkit.user.js' \
            --pattern 'MissionChief_Map_Command_Toolkit.txt'
          cmp --silent /tmp/repaired-release/MissionChief_Map_Command_Toolkit.user.js \
            /tmp/repaired-release/MissionChief_Map_Command_Toolkit.txt
          [[ "$(sha256sum /tmp/repaired-release/MissionChief_Map_Command_Toolkit.user.js | awk '{print $1}')" == "$RELEASE_HASH" ]] || {
            echo "::error::Repaired stable release asset has the wrong SHA-256."
            exit 1
          }

          gh release view "$TAG" --json name,body > /tmp/release-state.json
          jq -r '.body' /tmp/release-state.json > /tmp/release-notes.md
          gh release edit "$TAG" --title "$(jq -r '.name' /tmp/release-state.json)" --notes-file /tmp/release-notes.md --latest

      - name: Write recovery summary
        if: always()
        env:
          OPERATION: ${{ inputs.operation }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_HASH: ${{ steps.bundle.outputs.release_sha256 }}
        shell: bash
        run: |
          {
            echo "# Toolkit release recovery"
            echo
            echo "- Operation: \`${OPERATION}\`"
            echo "- Version: \`v${RELEASE_VERSION}\`"
            echo "- Verified SHA-256: \`${RELEASE_HASH:-unavailable}\`"
            echo "- Production lock: \`toolkit-production-release\`"
            echo "- Recovery ledger: \`release-state\`"
            echo "- Public main changed: no"
            echo "- No new GitHub Release was created"
          } >> "$GITHUB_STEP_SUMMARY"
