name: Issue 153 Source Diagnostic

on:
  push:
    branches:
      - feature/issue-153-version-status

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Inspect exact Toolkit control and lifecycle anchors
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/issue-153-targeted.txt"
          from pathlib import Path
          import re

          source = Path('src/MissionChief_Map_Command_Toolkit.user.js').read_text(encoding='utf-8')
          lines = source.splitlines()

          def emit(title, indexes, before=18, after=36, limit=12):
              print(f'\n## {title}')
              emitted=[]
              for index in indexes:
                  start=max(0,index-before); end=min(len(lines),index+after)
                  if emitted and start <= emitted[-1][1]:
                      emitted[-1]=(emitted[-1][0],max(emitted[-1][1],end))
                  else:
                      emitted.append((start,end))
              for start,end in emitted[:limit]:
                  print(f'--- lines {start+1}-{end} ---')
                  for n in range(start,end): print(f'{n+1:05d}: {lines[n]}')

          exact_patterns = {
              'CONTROL_ID_RUNTIME': re.compile(r'(?:getElementById\(SCRIPT\.controlId\)|\.id\s*=\s*SCRIPT\.controlId|id:\s*SCRIPT\.controlId)'),
              'CONTROL_CLASSES': re.compile(r'(?:leaflet-control|mcms-shell|mcms-main-button|mcms-control)', re.I),
              'CONTROL_FUNCTIONS': re.compile(r'^\s*function\s+\w*(?:Control|control|Dock|dock|Shell|shell|Button|button)\w*\s*\('),
              'BOOT_LIFECYCLE': re.compile(r'^\s*(?:async\s+)?function\s+\w*(?:boot|Boot|teardown|Teardown|destroy|Destroy|cleanup|Cleanup|shutdown|Shutdown)\w*\s*\('),
              'VISIBILITY': re.compile(r'visibilitychange|document\.visibilityState'),
              'RUNTIME_REPLACEMENT': re.compile(r'runtime replacement|runtimeReplacement|__mcms|destroy\s*:\s*|teardown\s*:\s*', re.I),
              'STORAGE_HELPERS': re.compile(r'^\s*(?:async\s+)?function\s+\w*(?:Storage|storage|Persist|persist|Setting|setting|Value|value)\w*\s*\('),
              'NETWORK_HELPERS': re.compile(r'GM_xmlhttpRequest|AbortController|fetch\s*\('),
          }
          for title, pattern in exact_patterns.items():
              indexes=[i for i,line in enumerate(lines) if pattern.search(line)]
              if title == 'CONTROL_CLASSES': indexes=[i for i in indexes if i > 15000]
              emit(title,indexes,limit=18)

          print('\n## LAST_900_LINES')
          for n in range(max(0,len(lines)-900),len(lines)):
              print(f'{n+1:05d}: {lines[n]}')
          PY

          body="$RUNNER_TEMP/issue-153-targeted-comment.md"
          {
            echo '### Issue #153 targeted runtime diagnostic'
            echo
            echo '<details><summary>Exact control, lifecycle and network anchors</summary>'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/issue-153-targeted.txt"
            echo '```'
            echo '</details>'
          } > "$body"
          gh issue comment 153 --repo "$GITHUB_REPOSITORY" --body-file "$body"
