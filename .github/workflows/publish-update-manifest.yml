name: Verify Toolkit Update Manifest

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "status/update-manifest.json"
      - "status/release-dashboard.json"
      - ".github/release-settings.json"
      - ".github/scripts/build_stable_update_manifest.py"
      - ".github/workflows/publish-update-manifest.yml"
      - ".github/workflows/release-toolkit.yml"
      - ".github/actions-security-policy.json"
      - ".github/branch-write-inventory.json"
      - "docs/BRANCH_PROTECTION_MIGRATION.md"
      - "docs/BRANCH_WRITE_INVENTORY.md"
  push:
    branches:
      - main
    paths:
      - "status/update-manifest.json"
      - "status/release-dashboard.json"
      - ".github/release-settings.json"
      - ".github/scripts/build_stable_update_manifest.py"
      - ".github/workflows/publish-update-manifest.yml"
      - ".github/workflows/release-toolkit.yml"

permissions:
  contents: read

concurrency:
  group: verify-toolkit-update-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify stable update manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out exact repository state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Validate manifest-builder self-tests
        run: python3 .github/scripts/build_stable_update_manifest.py --self-test

      - name: Verify committed manifest projection
        id: manifest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p update-manifest-evidence
          python3 .github/scripts/build_stable_update_manifest.py --check \
            2>&1 | tee update-manifest-evidence/verification.log
          status=${PIPESTATUS[0]}

          cp status/update-manifest.json update-manifest-evidence/update-manifest.json
          jq -n \
            --arg sourceCommit "$GITHUB_SHA" \
            --arg generatedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --arg version "$(jq -r '.version' status/update-manifest.json)" \
            --arg sha256 "$(jq -r '.sha256' status/update-manifest.json)" \
            --argjson acceptable "$([[ "$status" -eq 0 ]] && echo true || echo false)" \
            '{
              schemaVersion: 1,
              state: (if $acceptable then "synchronized" else "mismatch" end),
              acceptable: $acceptable,
              sourceCommit: $sourceCommit,
              generatedAt: $generatedAt,
              version: $version,
              sha256: $sha256,
              publicMainChanged: false,
              releaseDashboardChanged: false,
              updateManifestChanged: false
            }' > update-manifest-evidence/update-manifest-verification.json

          {
            echo "# Stable update manifest verification"
            echo
            echo "- State: **$([[ "$status" -eq 0 ]] && echo synchronized || echo mismatch)**"
            echo "- Version: \`$(jq -r '.version' status/update-manifest.json)\`"
            echo "- SHA-256: \`$(jq -r '.sha256' status/update-manifest.json)\`"
            echo "- Public main changed: **no**"
          } > update-manifest-evidence/update-manifest-verification.md

          exit "$status"

      - name: Upload immutable manifest evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-update-manifest-verification-${{ github.sha }}
          path: update-manifest-evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Publish manifest summary
        if: always()
        shell: bash
        run: |
          if [[ -f update-manifest-evidence/update-manifest-verification.md ]]; then
            cat update-manifest-evidence/update-manifest-verification.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce manifest result
        if: steps.manifest.outcome != 'success'
        run: |
          echo "Stable update manifest differs from the verified release ledger. No automatic mutation was attempted."
          exit 1
