name: Agent inspect monospaced notes integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect userscript integration anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/MissionChief_Map_Command_Toolkit.user.js')
          lines = path.read_text(encoding='utf-8').splitlines()
          patterns = [
              "allianceBuildingsMap",
              "allianceBuildingsMapBlocker",
              "missionRequirements",
              "toggleRoutes",
              "toggleStatePaths",
              "data-toggle",
              "data-setting",
              "function renderPanel",
              "function render",
              "saveState",
              "loadState",
              "DEFAULT_STATE",
              "defaultState",
              "const defaults",
              "settings-grid",
              "Settings",
          ]

          seen = set()
          for pattern in patterns:
              matches = [i for i, line in enumerate(lines) if pattern in line]
              print(f'\n===== PATTERN: {pattern!r} ({len(matches)} matches) =====')
              for i in matches[:30]:
                  start = max(0, i - 12)
                  end = min(len(lines), i + 13)
                  key = (start, end)
                  if key in seen:
                      continue
                  seen.add(key)
                  print(f'--- lines {start + 1}-{end} ---')
                  for n in range(start, end):
                      print(f'{n + 1:06d}: {lines[n]}')
          PY
