name: Repository and Dependency Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/audit_repository.py"
      - ".github/workflows/repository-audit.yml"

permissions:
  contents: read

concurrency:
  group: repository-dependency-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit repository and live userscript dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out latest main without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Run non-destructive artifact audit
        env:
          REPOSITORY_AUDIT_OUTPUT_DIR: repository-audit-output
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/audit_repository.py
          jq -e \
            '.storage.type == "workflow-artifact" and
             .storage.publicMainChanged == false and
             .storage.releaseDashboardChanged == false' \
            repository-audit-output/repository-audit.json >/dev/null

      - name: Upload immutable audit reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: missionchief-repository-audit-${{ github.sha }}
          path: repository-audit-output/
          if-no-files-found: error
          retention-days: 90

      - name: Publish audit summary
        shell: bash
        run: cat repository-audit-output/repository-audit.md >> "$GITHUB_STEP_SUMMARY"
