name: One-time v4.13.0 Hyrule Command Release Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/v4130-release-dispatch-once.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: toolkit-v4130-release-dispatch-once
  cancel-in-progress: false

jobs:
  dispatch:
    name: Validate and publish Hyrule Command v4.13.0
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm exact Hyrule Command release candidate
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="src/MissionChief_Map_Command_Toolkit.user.js"
          AUDIO="assets/audio/hyrule-quest-reward.mp3"
          grep -Eq '^//[[:space:]]*@version[[:space:]]+4\.13\.0[[:space:]]*$' "$SOURCE"
          grep -Fq "version: '4.13.0'" "$SOURCE"
          grep -Fq "Hyrule Command" "$SOURCE"
          test -s "$AUDIO"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.user.js"
          cmp --silent "$SOURCE" "dist/MissionChief_Map_Command_Toolkit.txt"
          echo "c57058d4d493756c34cbe60ee83689ce6fedc435ace3ef483cc2acade1c33072  $SOURCE" | sha256sum --check --strict

      - name: Record release start
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 52 --body "Automated Hyrule Command v4.13.0 release started from dispatcher run ${GITHUB_RUN_ID}. Candidate SHA-256: \`c57058d4d493756c34cbe60ee83689ce6fedc435ace3ef483cc2acade1c33072\`."

      - name: Dispatch and await correlated Release Readiness run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-readiness-check.yml --ref main -f version=4.13.0
          RUN_ID=""
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-readiness-check.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The newly dispatched Release Readiness run was not found."; exit 1; }
          gh issue comment 52 --body "Hyrule Command v4.13.0 Release Readiness started as Actions run \`${RUN_ID}\`."
          gh run watch "$RUN_ID" --exit-status

      - name: Dispatch and await correlated production release run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run release-toolkit.yml --ref main -f version=4.13.0 -f confirmation=RELEASE
          RUN_ID=""
          for attempt in {1..60}; do
            RUN_ID="$(gh run list --workflow release-toolkit.yml --event workflow_dispatch --branch main --limit 30 --json databaseId,createdAt -q "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | reverse | .[0].databaseId // empty")"
            [[ -n "$RUN_ID" ]] && break
            sleep 2
          done
          [[ -n "$RUN_ID" ]] || { echo "::error::The newly dispatched production release run was not found."; exit 1; }
          gh issue comment 52 --body "Hyrule Command v4.13.0 production release started as Actions run \`${RUN_ID}\`. GitHub Release, Greasy Fork verification, private backup and Discord announcement remain guarded inside that workflow."
          gh run watch "$RUN_ID" --exit-status

      - name: Record successful completion
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 52 --body "Hyrule Command v4.13.0 production release completed successfully. GitHub Release publication, Greasy Fork synchronization, private backup and Discord announcement all passed."

      - name: Record guarded failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 52 --body "Hyrule Command v4.13.0 release stopped at a guarded pipeline check. Dispatcher diagnostics: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. No failed gate was bypassed."

  cleanup:
    name: Remove one-time v4.13.0 dispatcher
    if: always()
    needs: dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Remove dispatcher
        shell: bash
        run: |
          set -euo pipefail
          FILE=".github/workflows/v4130-release-dispatch-once.yml"
          [[ -f "$FILE" ]] || exit 0
          git rm "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove completed v4.13.0 release dispatcher"
          git pull --rebase origin main
          git push origin HEAD:main
