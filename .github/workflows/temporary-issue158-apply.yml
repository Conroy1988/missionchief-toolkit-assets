name: Apply Issue 158 Candidate

on:
  push:
    branches:
      - agent/issue-158-transport-sweep-confirmation
    paths:
      - ".github/workflows/temporary-issue158-apply.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-issue158-apply.yml"

permissions:
  contents: write

concurrency:
  group: issue-158-candidate-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/issue-158-transport-sweep-confirmation
          fetch-depth: 0

      - name: Reconstruct reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .automation/issue158.patch.part00 \
            .automation/issue158.patch.part01 \
            .automation/issue158.patch.part02a \
            .automation/issue158.patch.part02b1 \
            > /tmp/issue158.patch.b64
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/issue158.patch.b64')
          with path.open('a', encoding='utf-8') as handle:
              handle.write('K7QBHKIL6U4/fWPbJhszU7vRNqmasSVuk+rpvbONXrOtd5vtRnun08h/U+EJTbS7vWZT39/bb+y2G7ut')
              handle.write('4kmF' * 49)
              handle.write('/9pPKvx/Tw9d+tMMAQA=')
          PY
          [[ "$(wc -c < /tmp/issue158.patch.b64)" -eq 15592 ]]
          base64 --decode /tmp/issue158.patch.b64 | gzip --decompress > /tmp/issue158.patch
          if ! git apply --check --verbose /tmp/issue158.patch > /tmp/issue158-apply-check.txt 2>&1; then
            cat /tmp/issue158-apply-check.txt
            cp /tmp/issue158-apply-check.txt .automation/issue158-apply-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .automation/issue158-apply-error.txt
            git commit -m "Record Issue 158 patch conflict"
            git push origin HEAD:agent/issue-158-transport-sweep-confirmation
            exit 1
          fi
          git apply /tmp/issue158.patch

      - name: Remove temporary transfer machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -f .automation/issue158.patch.part*
          rm -f .automation/issue158-apply-error.txt
          rm -f .github/workflows/temporary-issue158-apply.yml
          rmdir .automation 2>/dev/null || true

      - name: Validate candidate
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          python3 .github/scripts/validate_userscript.py
          node --check src/MissionChief_Map_Command_Toolkit.user.js
          bash .github/scripts/run_userscript_preflight.sh --contracts
          python3 .github/scripts/check_documentation_drift.py --allow-release-candidate
          git checkout -- documentation-drift-report.json documentation-drift-report.md

      - name: Commit reviewed candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Fix Transport Sweep confirmed release counting (#158)"
          git push origin HEAD:agent/issue-158-transport-sweep-confirmation
