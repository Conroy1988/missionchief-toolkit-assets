name: Apply Maximum Release Speed Optimisation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-max-release-speed-export.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out optimisation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.DEVELOPMENT_PR_TOKEN || github.token }}

      - name: Reconstruct reviewed optimisation patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/development-packages/max-release-speed.part-00 \
            .github/development-packages/max-release-speed.part-01 \
            .github/development-packages/max-release-speed.part-02 \
            .github/development-packages/max-release-speed.part-03 > /tmp/max-release-speed.b64
          test "$(sha256sum /tmp/max-release-speed.b64 | awk '{print $1}')" = "c95f0d46c41da4b57dd2d3e48db6a28e7d0e376b854fbfd4eb94694768431d8b"
          base64 -d /tmp/max-release-speed.b64 | gzip -d > /tmp/max-release-speed.patch
          test "$(sha256sum /tmp/max-release-speed.patch | awk '{print $1}')" = "b0028372fd7a8bd3f2b8904d69d1dfce131c190b696848d16b5496a9ae118343"
          git apply --check /tmp/max-release-speed.patch
          git apply /tmp/max-release-speed.patch

      - name: Remove temporary transfer machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temporary-max-release-speed-export.yml \
            .github/development-packages/max-release-speed.part-00 \
            .github/development-packages/max-release-speed.part-01 \
            .github/development-packages/max-release-speed.part-02 \
            .github/development-packages/max-release-speed.part-03

      - name: Validate Actions security
        run: python3 .github/scripts/audit_actions_security.py

      - name: Validate release contracts
        run: |
          python3 .github/scripts/test_version_status_contract.py
          python3 .github/scripts/test_pages_release_deploy_contract.py

      - name: Run full userscript preflight
        run: bash .github/scripts/run_userscript_preflight.sh

      - name: Commit validated optimisation
        shell: bash
        run: |
          set -euo pipefail
          rm -f actions-security-report.json actions-security-report.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "::error::Validated optimisation produced no staged changes."; exit 1; }
          git status --short
          git commit -m "Maximise Toolkit release pipeline speed"

      - name: Attempt validated push
        id: push
        shell: bash
        run: |
          set +e
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}" > push-diagnostic.log 2>&1
          STATUS=$?
          cat push-diagnostic.log
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload push diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: max-release-speed-push-diagnostic
          path: push-diagnostic.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop on push failure
        if: steps.push.outputs.status != '0'
        run: |
          echo "::error::Validated optimisation commit could not be pushed. See the diagnostic artifact."
          exit 1
