name: Repository and Dependency Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/audit_repository.py"
      - ".github/workflows/repository-audit.yml"
      - "status/release-dashboard.json"

permissions:
  contents: write

concurrency:
  group: repository-dependency-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit repository and live userscript dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out latest main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Run non-destructive audit
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/audit_repository.py

      - name: Upload audit reports
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: missionchief-repository-audit
          path: |
            status/repository-audit.md
            status/repository-audit.json
            status/release-dashboard.json
          if-no-files-found: error
          retention-days: 90

      - name: Commit updated audit state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/repository-audit.md status/repository-audit.json status/release-dashboard.json

          if git diff --cached --quiet; then
            echo "Audit state is already current."
            exit 0
          fi

          git commit -m "Update repository dependency audit"
          git pull --rebase origin main
          git push origin HEAD:main
