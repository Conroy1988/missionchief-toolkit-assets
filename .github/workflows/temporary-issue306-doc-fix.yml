name: Correct Issue 306 Documentation Version

on:
  push:
    branches:
      - agent/issue-306-matrix-reconciliation
    paths:
      - ".github/workflows/temporary-issue306-doc-fix.yml"

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Correct static Help Centre version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('help/index.html')
          text = path.read_text(encoding='utf-8')
          old_badge = 'Guide for Toolkit v4.20.21'
          old_footer = 'Help Centre for v4.15.2 · Updated 17 July 2026'
          if text.count(old_badge) != 1 or text.count(old_footer) != 1:
              raise SystemExit('Reviewed Help Centre version anchors were not found exactly once.')
          text = text.replace(old_badge, 'Guide for Toolkit v4.20.22')
          text = text.replace(old_footer, 'Help Centre for v4.20.22 · Updated 21 July 2026')
          path.write_text(text, encoding='utf-8')
          PY
          python3 .github/scripts/check_documentation_drift.py --allow-release-candidate

      - name: Remove temporary workflow and generated caches
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/temporary-issue306-doc-fix.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -f documentation-drift-report.json documentation-drift-report.md

      - name: Commit documentation correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align Help Centre with Toolkit 4.20.22"
          git push origin HEAD:agent/issue-306-matrix-reconciliation
