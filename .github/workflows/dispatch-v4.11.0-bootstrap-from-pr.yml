name: Dispatch Toolkit v4.11.0 Bootstrap

on:
  pull_request:
    types:
      - opened

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Dispatch validated v4.11.0 bootstrap
    if: github.event.pull_request.title == '[Release Trigger] Toolkit v4.11.0 Smart Bookmark Labels'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch bootstrap workflow on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bootstrap-v4.11.0-smart-bookmarks.yml --repo "$GITHUB_REPOSITORY" --ref main
